---
# Temporary Talos logging patch — Phase 3 of plan 0007. Reverts in Phase 5
# once the k8s-2 root cause is localized. Do not keep this file past the
# plan's close — ADR 0008 defers the logging platform; this patch is a
# diagnostic instrument only.
#
# service logs: machine.logging.destinations writes Talos service-layer JSON
# lines (controller-runtime, kubelet, machined) over TCP to the Vector sink
# at 192.168.1.105:6000.
#
# Kernel dmesg streaming is NOT enabled here. Talos v1.12 boots with
# grubUseUKICmdline=true (UKI seals the cmdline), so install.extraKernelArgs
# is rejected. The kernel-logging arm (talos.logging.kernel=tcp://...) would
# need runtime injection via the META partition (talosctl meta write) per
# node. Deferred — service logs alone give us the pre-reboot lead-up.
machine:
  logging:
    destinations:
      - endpoint: "tcp://192.168.1.105:6000"
        format: "json_lines"
