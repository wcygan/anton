---
# Temporary Talos logging patch — Phase 3 of plan 0007. Reverts in Phase 5
# once the k8s-2 root cause is localized. Do not keep this file past the
# plan's close — ADR 0008 defers the logging platform; this patch is a
# diagnostic instrument only.
#
# service logs: machine.logging.destinations writes Talos service-layer JSON
# lines over TCP to the Vector sink at 192.168.1.105:6000.
#
# kernel logs: machine.install.extraKernelArgs adds the talos.logging.kernel
# kernel cmdline arg so the kernel dmesg stream is forwarded to Vector at
# 192.168.1.105:6001. This arg requires a reboot per node to take effect.
machine:
  install:
    extraKernelArgs:
      - talos.logging.kernel=tcp://192.168.1.105:6001
  logging:
    destinations:
      - endpoint: "tcp://192.168.1.105:6000"
        format: "json_lines"
