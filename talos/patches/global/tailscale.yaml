# WHY: Enable Tailscale on nodes for remote access and
# Tailscale operator connectivity (kubectl/talosctl off-LAN)
apiVersion: v1alpha1
kind: ExtensionServiceConfig
name: tailscale
environment:
  - TS_AUTHKEY=${TAILSCALE_AUTHKEY}
  # WHY: Store tailscaled state in memory. Persisting to /var/lib/tailscale
  # triggered a stuck ghost nodekey on Tailscale control plane that couldn't
  # be cleared. mem: means nodes re-register on reboot (new -1 suffix name);
  # rename via admin console when this happens. Reboots are rare.
  - "TS_STATE_DIR=mem:"
