---
clusterName: kubernetes

talosVersion: "${talosVersion}"
kubernetesVersion: "${kubernetesVersion}"

endpoint: https://192.168.1.101:6443
additionalApiServerCertSans: &sans
  - "127.0.0.1"
  - "192.168.1.101"
additionalMachineCertSans: *sans

clusterPodNets: ["10.42.0.0/16"]
clusterSvcNets: ["10.43.0.0/16"]

# Disable built-in CNI to use Cilium
cniConfig:
  name: none

nodes:
  - hostname: "k8s-1"
    ipAddress: "192.168.1.98"
    installDiskSelector:
      serial: "24304A343650"
    machineSpec:
      secureboot: false
    talosImageURL: factory.talos.dev/installer/445a99db4002e6127e7f6e2a96377ac2c06d0de52f7a186b5536c0ac2f2a2ece
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "58:47:ca:79:7c:a2"
        dhcp: false
        addresses:
          - "192.168.1.98/24"
        routes:
          - network: "0.0.0.0/0"
            gateway: "192.168.1.254"
        mtu: 1500
        vip:
          ip: "192.168.1.101"
    # Longhorn data disks (ADR 0005, plan 0001). Mounted at /var/mnt/<name>.
    userVolumes:
      - name: longhorn-1
        provisioning:
          diskSelector:
            match: disk.serial == "251021802186"
          minSize: 100GB
          grow: true
        filesystem:
          type: ext4
      - name: longhorn-2
        provisioning:
          diskSelector:
            match: disk.serial == "251021802190"
          minSize: 100GB
          grow: true
        filesystem:
          type: ext4
    patches:
      - |-
        machine:
          kubelet:
            extraMounts:
              - destination: /var/mnt/longhorn-1
                type: bind
                source: /var/mnt/longhorn-1
                options:
                  - bind
                  - rshared
                  - rw
              - destination: /var/mnt/longhorn-2
                type: bind
                source: /var/mnt/longhorn-2
                options:
                  - bind
                  - rshared
                  - rw
          nodeLabels:
            node.longhorn.io/create-default-disk: "config"
          nodeAnnotations:
            node.longhorn.io/default-disks-config: |-
              [{"path":"/var/mnt/longhorn-1","allowScheduling":true},{"path":"/var/mnt/longhorn-2","allowScheduling":true}]
  - hostname: "k8s-2"
    ipAddress: "192.168.1.99"
    installDiskSelector:
      serial: "24304A23D2F0"
    machineSpec:
      secureboot: false
    talosImageURL: factory.talos.dev/installer/445a99db4002e6127e7f6e2a96377ac2c06d0de52f7a186b5536c0ac2f2a2ece
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "58:47:ca:79:78:ba"
        dhcp: false
        addresses:
          - "192.168.1.99/24"
        routes:
          - network: "0.0.0.0/0"
            gateway: "192.168.1.254"
        mtu: 1500
        vip:
          ip: "192.168.1.101"
    # Longhorn data disks — k8s-2 has only 1 NVMe (2nd slot empty; see context/hardware.md).
    userVolumes:
      - name: longhorn-1
        provisioning:
          diskSelector:
            match: disk.serial == "251021802221"
          minSize: 100GB
          grow: true
        filesystem:
          type: ext4
    patches:
      - |-
        machine:
          kubelet:
            extraMounts:
              - destination: /var/mnt/longhorn-1
                type: bind
                source: /var/mnt/longhorn-1
                options:
                  - bind
                  - rshared
                  - rw
          nodeLabels:
            node.longhorn.io/create-default-disk: "config"
          nodeAnnotations:
            node.longhorn.io/default-disks-config: |-
              [{"path":"/var/mnt/longhorn-1","allowScheduling":true}]
  - hostname: "k8s-3"
    ipAddress: "192.168.1.100"
    installDiskSelector:
      serial: "24304A23705F"
    machineSpec:
      secureboot: false
    talosImageURL: factory.talos.dev/installer/445a99db4002e6127e7f6e2a96377ac2c06d0de52f7a186b5536c0ac2f2a2ece
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "58:47:ca:7a:54:aa"
        dhcp: false
        addresses:
          - "192.168.1.100/24"
        routes:
          - network: "0.0.0.0/0"
            gateway: "192.168.1.254"
        mtu: 1500
        vip:
          ip: "192.168.1.101"
    # Longhorn data disks
    userVolumes:
      - name: longhorn-1
        provisioning:
          diskSelector:
            match: disk.serial == "251021800405"
          minSize: 100GB
          grow: true
        filesystem:
          type: ext4
      - name: longhorn-2
        provisioning:
          diskSelector:
            match: disk.serial == "251021801882"
          minSize: 100GB
          grow: true
        filesystem:
          type: ext4
    patches:
      - |-
        machine:
          kubelet:
            extraMounts:
              - destination: /var/mnt/longhorn-1
                type: bind
                source: /var/mnt/longhorn-1
                options:
                  - bind
                  - rshared
                  - rw
              - destination: /var/mnt/longhorn-2
                type: bind
                source: /var/mnt/longhorn-2
                options:
                  - bind
                  - rshared
                  - rw
          nodeLabels:
            node.longhorn.io/create-default-disk: "config"
          nodeAnnotations:
            node.longhorn.io/default-disks-config: |-
              [{"path":"/var/mnt/longhorn-1","allowScheduling":true},{"path":"/var/mnt/longhorn-2","allowScheduling":true}]

# Global patches
patches:
  - "@./patches/global/machine-files.yaml"
  - "@./patches/global/machine-kubelet.yaml"
  - "@./patches/global/machine-network.yaml"
  - "@./patches/global/machine-sysctls.yaml"
  - "@./patches/global/machine-time.yaml"
  - "@./patches/global/tailscale.yaml"

# Controller patches
controlPlane:
  patches:
    - "@./patches/controller/cluster.yaml"

