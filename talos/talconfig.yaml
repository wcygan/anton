---
clusterName: kubernetes

talosVersion: "${talosVersion}"
kubernetesVersion: "${kubernetesVersion}"

endpoint: https://192.168.1.101:6443
additionalApiServerCertSans: &sans
  - "127.0.0.1"
  - "192.168.1.101"
additionalMachineCertSans: *sans

clusterPodNets: ["10.42.0.0/16"]
clusterSvcNets: ["10.43.0.0/16"]

# Disable built-in CNI to use Cilium
cniConfig:
  name: none

nodes:
  - hostname: "k8s-1"
    ipAddress: "192.168.1.98"
    installDiskSelector:
      serial: "24304A343650"
    machineSpec:
      secureboot: false
    talosImageURL: factory.talos.dev/installer/445a99db4002e6127e7f6e2a96377ac2c06d0de52f7a186b5536c0ac2f2a2ece
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "58:47:ca:79:7c:a2"
        dhcp: false
        addresses:
          - "192.168.1.98/24"
        routes:
          - network: "0.0.0.0/0"
            gateway: "192.168.1.254"
        mtu: 1500
        vip:
          ip: "192.168.1.101"
      # SFP+ storage mesh (ADR 0009, plan 0004). /31 per DAC, no default route, MTU 9000.
      # Peer-VTEP routes (plan 0004 phase 4b) steer overlay VTEP traffic onto the correct DAC.
      # DAC #1 → k8s-2 enp2s0f1np1 (10.100.0.1)
      - deviceSelector:
          hardwareAddr: "58:47:ca:79:7c:a0"
        dhcp: false
        addresses:
          - "10.100.0.0/31"
        routes:
          - network: "10.100.100.2/32"
            gateway: "10.100.0.1"
        mtu: 9000
      # DAC #2 → k8s-3 enp2s0f1np1 (10.100.0.3)
      - deviceSelector:
          hardwareAddr: "58:47:ca:79:7c:a1"
        dhcp: false
        addresses:
          - "10.100.0.2/31"
        routes:
          - network: "10.100.100.3/32"
            gateway: "10.100.0.3"
        mtu: 9000
    # Longhorn data disks (ADR 0005, plan 0001). Mounted at /var/mnt/<name>.
    userVolumes:
      - name: longhorn-1
        provisioning:
          diskSelector:
            match: disk.serial == "251021802186"
          minSize: 100GB
          grow: true
        filesystem:
          type: ext4
      - name: longhorn-2
        provisioning:
          diskSelector:
            match: disk.serial == "251021802190"
          minSize: 100GB
          grow: true
        filesystem:
          type: ext4
    patches:
      # VXLAN VTEP loopback (plan 0004 phase 4b). Must be DummyLinkConfig —
      # talhelper's `dummy: true` flag is silently dropped from LinkConfig.
      - |-
        apiVersion: v1alpha1
        kind: DummyLinkConfig
        name: dummy0
        addresses:
          - address: 10.100.100.1/32
      - |-
        machine:
          kubelet:
            extraMounts:
              - destination: /var/mnt/longhorn-1
                type: bind
                source: /var/mnt/longhorn-1
                options:
                  - bind
                  - rshared
                  - rw
              - destination: /var/mnt/longhorn-2
                type: bind
                source: /var/mnt/longhorn-2
                options:
                  - bind
                  - rshared
                  - rw
          nodeLabels:
            node.longhorn.io/create-default-disk: "config"
          nodeAnnotations:
            node.longhorn.io/default-disks-config: |-
              [{"path":"/var/mnt/longhorn-1","allowScheduling":true},{"path":"/var/mnt/longhorn-2","allowScheduling":true}]
  - hostname: "k8s-2"
    ipAddress: "192.168.1.99"
    installDiskSelector:
      serial: "24304A23D2F0"
    machineSpec:
      secureboot: false
    talosImageURL: factory.talos.dev/installer/445a99db4002e6127e7f6e2a96377ac2c06d0de52f7a186b5536c0ac2f2a2ece
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "58:47:ca:79:78:ba"
        dhcp: false
        addresses:
          - "192.168.1.99/24"
        routes:
          - network: "0.0.0.0/0"
            gateway: "192.168.1.254"
        mtu: 1500
        vip:
          ip: "192.168.1.101"
      # SFP+ storage mesh (ADR 0009, plan 0004). /31 per DAC, no default route, MTU 9000.
      # Peer-VTEP routes (plan 0004 phase 4b) steer overlay VTEP traffic onto the correct DAC.
      # DAC #1 → k8s-1 enp2s0f0np0 (10.100.0.0)
      - deviceSelector:
          hardwareAddr: "58:47:ca:79:78:b9"
        dhcp: false
        addresses:
          - "10.100.0.1/31"
        routes:
          - network: "10.100.100.1/32"
            gateway: "10.100.0.0"
        mtu: 9000
      # DAC #3 → k8s-3 enp2s0f0np0 (10.100.0.5)
      - deviceSelector:
          hardwareAddr: "58:47:ca:79:78:b8"
        dhcp: false
        addresses:
          - "10.100.0.4/31"
        routes:
          - network: "10.100.100.3/32"
            gateway: "10.100.0.5"
        mtu: 9000
    # Longhorn data disks (ADR 0005, plan 0001). Mounted at /var/mnt/<name>.
    # 2nd NVMe reseated 2026-04-18; now symmetric 2+2+2 with k8s-1/k8s-3.
    userVolumes:
      - name: longhorn-1
        provisioning:
          diskSelector:
            match: disk.serial == "251021802221"
          minSize: 100GB
          grow: true
        filesystem:
          type: ext4
      - name: longhorn-2
        provisioning:
          diskSelector:
            match: disk.serial == "251021801877"
          minSize: 100GB
          grow: true
        filesystem:
          type: ext4
    patches:
      # VXLAN VTEP loopback (plan 0004 phase 4b). Must be DummyLinkConfig —
      # talhelper's `dummy: true` flag is silently dropped from LinkConfig.
      - |-
        apiVersion: v1alpha1
        kind: DummyLinkConfig
        name: dummy0
        addresses:
          - address: 10.100.100.2/32
      - |-
        machine:
          kubelet:
            extraMounts:
              - destination: /var/mnt/longhorn-1
                type: bind
                source: /var/mnt/longhorn-1
                options:
                  - bind
                  - rshared
                  - rw
              - destination: /var/mnt/longhorn-2
                type: bind
                source: /var/mnt/longhorn-2
                options:
                  - bind
                  - rshared
                  - rw
          nodeLabels:
            node.longhorn.io/create-default-disk: "config"
          nodeAnnotations:
            node.longhorn.io/default-disks-config: |-
              [{"path":"/var/mnt/longhorn-1","allowScheduling":true},{"path":"/var/mnt/longhorn-2","allowScheduling":true}]
  - hostname: "k8s-3"
    ipAddress: "192.168.1.100"
    installDiskSelector:
      serial: "24304A23705F"
    machineSpec:
      secureboot: false
    talosImageURL: factory.talos.dev/installer/445a99db4002e6127e7f6e2a96377ac2c06d0de52f7a186b5536c0ac2f2a2ece
    controlPlane: true
    networkInterfaces:
      - deviceSelector:
          hardwareAddr: "58:47:ca:7a:54:aa"
        dhcp: false
        addresses:
          - "192.168.1.100/24"
        routes:
          - network: "0.0.0.0/0"
            gateway: "192.168.1.254"
        mtu: 1500
        vip:
          ip: "192.168.1.101"
      # SFP+ storage mesh (ADR 0009, plan 0004). /31 per DAC, no default route, MTU 9000.
      # Peer-VTEP routes (plan 0004 phase 4b) steer overlay VTEP traffic onto the correct DAC.
      # DAC #3 → k8s-2 enp2s0f0np0 (10.100.0.4)
      - deviceSelector:
          hardwareAddr: "58:47:ca:7a:54:a8"
        dhcp: false
        addresses:
          - "10.100.0.5/31"
        routes:
          - network: "10.100.100.2/32"
            gateway: "10.100.0.4"
        mtu: 9000
      # DAC #2 → k8s-1 enp2s0f1np1 (10.100.0.2)
      - deviceSelector:
          hardwareAddr: "58:47:ca:7a:54:a9"
        dhcp: false
        addresses:
          - "10.100.0.3/31"
        routes:
          - network: "10.100.100.1/32"
            gateway: "10.100.0.2"
        mtu: 9000
    # Longhorn data disks
    userVolumes:
      - name: longhorn-1
        provisioning:
          diskSelector:
            match: disk.serial == "251021800405"
          minSize: 100GB
          grow: true
        filesystem:
          type: ext4
      - name: longhorn-2
        provisioning:
          diskSelector:
            match: disk.serial == "251021801882"
          minSize: 100GB
          grow: true
        filesystem:
          type: ext4
    patches:
      # VXLAN VTEP loopback (plan 0004 phase 4b). Must be DummyLinkConfig —
      # talhelper's `dummy: true` flag is silently dropped from LinkConfig.
      - |-
        apiVersion: v1alpha1
        kind: DummyLinkConfig
        name: dummy0
        addresses:
          - address: 10.100.100.3/32
      - |-
        machine:
          kubelet:
            extraMounts:
              - destination: /var/mnt/longhorn-1
                type: bind
                source: /var/mnt/longhorn-1
                options:
                  - bind
                  - rshared
                  - rw
              - destination: /var/mnt/longhorn-2
                type: bind
                source: /var/mnt/longhorn-2
                options:
                  - bind
                  - rshared
                  - rw
          nodeLabels:
            node.longhorn.io/create-default-disk: "config"
          nodeAnnotations:
            node.longhorn.io/default-disks-config: |-
              [{"path":"/var/mnt/longhorn-1","allowScheduling":true},{"path":"/var/mnt/longhorn-2","allowScheduling":true}]

# Global patches
patches:
  - "@./patches/global/machine-files.yaml"
  - "@./patches/global/machine-kernel.yaml"
  - "@./patches/global/machine-kmsg.yaml"
  - "@./patches/global/machine-kubelet.yaml"
  - "@./patches/global/machine-network.yaml"
  - "@./patches/global/machine-registries.yaml"
  - "@./patches/global/machine-sysctls.yaml"
  - "@./patches/global/machine-time.yaml"
  - "@./patches/global/tailscale.yaml"

# Controller patches
controlPlane:
  patches:
    - "@./patches/controller/cluster.yaml"
