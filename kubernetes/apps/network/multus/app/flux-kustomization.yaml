---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: multus-upstream
  namespace: network
spec:
  interval: 1h
  path: ./deployments
  prune: true
  wait: true
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: multus-upstream
    namespace: network
  targetNamespace: network
  patches:
    # Move DaemonSet to the network namespace
    - target:
        kind: DaemonSet
        name: kube-multus-ds
      patch: |-
        - op: replace
          path: /metadata/namespace
          value: network
    # Pin the thick-mode image tag
    - target:
        kind: DaemonSet
        name: kube-multus-ds
      patch: |-
        - op: replace
          path: /spec/template/spec/containers/0/image
          # renovate: datasource=docker depName=ghcr.io/k8snetworkplumbingwg/multus-cni
          value: ghcr.io/k8snetworkplumbingwg/multus-cni:v4.2.4-thick
    # Raise Multus cgroup memory limit 50Mi → 512Mi. Upstream default is
    # tuned for pod-creation rates that small clusters rarely see; anton
    # hits the limit during bursts because Multus invokes `cilium-cni` as
    # a sub-process per pod and each invocation briefly accounts ~6MB RSS
    # against the cgroup. With `memory.oom.group set`, a single OOM kills
    # multus-daemon + every in-flight cilium-cni child. Same class of bug
    # as plan 0007 hypothesis #4 (cilium-agent OOM), different process.
    # The 2026-04-23 Harbor drain still OOMKilled the 256Mi k8s-1 Multus
    # pod, so keep this as CNI hardening independent of the k8s-2 reset
    # root cause.
    - target:
        kind: DaemonSet
        name: kube-multus-ds
      patch: |-
        - op: replace
          path: /spec/template/spec/containers/0/resources/requests/memory
          value: 512Mi
        - op: replace
          path: /spec/template/spec/containers/0/resources/limits/memory
          value: 512Mi
    # CNI plumbing must survive node pressure ahead of ordinary workloads.
    - target:
        kind: DaemonSet
        name: kube-multus-ds
      patch: |-
        - op: add
          path: /spec/template/spec/priorityClassName
          value: system-node-critical
    # Move ServiceAccount to the network namespace
    - target:
        kind: ServiceAccount
        name: multus
      patch: |-
        - op: replace
          path: /metadata/namespace
          value: network
    # Move ConfigMap to the network namespace + enable thick-plugin metrics on
    # port 9091. Multus thick-plugin reads its server config from this JSON,
    # not CLI flags, so adding `metricsPort` here turns on the Prometheus
    # endpoint at :9091/metrics. Plan 0016 Phase 3 (IM-NAD-attach probe);
    # surfaces `nfvpe_multus_request_count{Status="error"}` so genuine CNI-add
    # errors page. (The 2026-05-06/07 silent-attach mode where the daemon
    # returns success without actually attaching is caught separately by the
    # kube-state-metrics annotation-allowlist alert in `prometheusrule.yaml`.)
    - target:
        kind: ConfigMap
        name: multus-daemon-config
      patch: |-
        - op: replace
          path: /metadata/namespace
          value: network
        - op: replace
          path: /data/daemon-config.json
          value: |
            {
                "chrootDir": "/hostroot",
                "cniVersion": "0.3.1",
                "logLevel": "verbose",
                "logToStderr": true,
                "cniConfigDir": "/host/etc/cni/net.d",
                "multusAutoconfigDir": "/host/etc/cni/net.d",
                "multusConfigFile": "auto",
                "socketDir": "/host/run/multus/",
                "metricsPort": 9091
            }
    # Expose the metrics port on the DaemonSet so the sibling Service can
    # target it by name. `reloader.stakater.com/auto: "true"` triggers a
    # rolling restart of the DS when the daemon-config ConfigMap changes —
    # multus-daemon does not watch the file, so a config-only edit otherwise
    # only takes effect on the next pod restart.
    - target:
        kind: DaemonSet
        name: kube-multus-ds
      patch: |-
        - op: add
          path: /metadata/annotations/reloader.stakater.com~1auto
          value: "true"
        - op: add
          path: /spec/template/spec/containers/0/ports
          value:
            - name: metrics
              containerPort: 9091
              protocol: TCP
    # Re-point ClusterRoleBinding subject to the relocated ServiceAccount
    - target:
        kind: ClusterRoleBinding
        name: multus
      patch: |-
        - op: replace
          path: /subjects/0/namespace
          value: network
    # Install reference CNI plugins (macvlan, ipvlan, vlan, tuning, …) into
    # /opt/cni/bin on each node. Talos v1.12.6 ships only the "essential"
    # subset (bridge/firewall/host-local/loopback/portmap); macvlan and the
    # rest come from this init container. Per ADR 0018 and
    # https://docs.siderolabs.com/kubernetes-guides/cni/multus. Reuses the
    # upstream DS's existing `cnibin` hostPath volume — same one the
    # `install-multus-binary` init container uses.
    - target:
        kind: DaemonSet
        name: kube-multus-ds
      patch: |-
        - op: add
          path: /spec/template/spec/initContainers/-
          value:
            name: install-cni
            # renovate: datasource=docker depName=ghcr.io/siderolabs/install-cni
            image: ghcr.io/siderolabs/install-cni:v1.9.0
            command: ["/install-cni.sh"]
            securityContext:
              privileged: true
            volumeMounts:
              - name: cnibin
                mountPath: /host/opt/cni/bin
                mountPropagation: Bidirectional
    # Pin the upstream `install-multus-binary` init container, which otherwise
    # rides the floating `:snapshot-thick` tag and installs an unpinned CNI
    # binary onto the host filesystem. The containers/0 pin above only covers
    # the main daemon; this strategic-merge patch is keyed by container name so
    # it survives upstream initContainer reordering.
    - target:
        kind: DaemonSet
        name: kube-multus-ds
      patch: |-
        apiVersion: apps/v1
        kind: DaemonSet
        metadata:
          name: kube-multus-ds
          namespace: network
        spec:
          template:
            spec:
              initContainers:
                - name: install-multus-binary
                  # renovate: datasource=docker depName=ghcr.io/k8snetworkplumbingwg/multus-cni
                  image: ghcr.io/k8snetworkplumbingwg/multus-cni:v4.2.4-thick
