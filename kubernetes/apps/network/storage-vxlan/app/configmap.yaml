---
apiVersion: v1
kind: ConfigMap
metadata:
  name: storage-vxlan-nodemap
  namespace: network
  labels:
    app.kubernetes.io/name: storage-vxlan
# Per-node VTEP / overlay mapping for the `vxlan-storage` interface (VNI 100).
# The DaemonSet sources /etc/vxlan-nodemap/${NODE_NAME}.env at start, so one
# image runs on every node with no per-node Pod spec.
#
# VTEP underlay loopbacks (dummy0, /32) are declared in talos/talconfig.yaml
# (Phase 4b); this ConfigMap must stay in sync with those addresses and with
# the SFP+ peer-VTEP static routes.
data:
  k8s-1.env: |
    NODE_VTEP=10.100.100.1
    NODE_OVERLAY_IP=10.100.1.1
    PEER1_VTEP=10.100.100.2
    PEER2_VTEP=10.100.100.3
  k8s-2.env: |
    NODE_VTEP=10.100.100.2
    NODE_OVERLAY_IP=10.100.1.2
    PEER1_VTEP=10.100.100.1
    PEER2_VTEP=10.100.100.3
  k8s-3.env: |
    NODE_VTEP=10.100.100.3
    NODE_OVERLAY_IP=10.100.1.3
    PEER1_VTEP=10.100.100.1
    PEER2_VTEP=10.100.100.2
