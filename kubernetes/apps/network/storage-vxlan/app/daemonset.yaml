---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: storage-vxlan
  namespace: network
  labels:
    app.kubernetes.io/name: storage-vxlan
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: storage-vxlan
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: storage-vxlan
    spec:
      serviceAccountName: storage-vxlan
      automountServiceAccountToken: false
      priorityClassName: system-node-critical
      hostNetwork: true
      hostPID: false
      dnsPolicy: ClusterFirstWithHostNet
      # 3-node all-control-plane cluster: tolerate the control-plane taint so
      # the DS actually schedules (without this, it stays 0/3).
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - name: vxlan
          # renovate: datasource=docker depName=nicolaka/netshoot
          image: nicolaka/netshoot:v0.16@sha256:b09d9b21381f47a79b3cbcb30da25266dc17186ea00ae65e99fdc51396f48e70
          imagePullPolicy: IfNotPresent
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          securityContext:
            privileged: false
            runAsNonRoot: false
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            seccompProfile:
              type: RuntimeDefault
            capabilities:
              add:
                - NET_ADMIN
              drop:
                - ALL
          resources:
            requests:
              cpu: 10m
              memory: 64Mi
            limits:
              memory: 128Mi
          readinessProbe:
            exec:
              command:
                - /bin/bash
                - -ec
                - |
                  source "/etc/vxlan-nodemap/$${NODE_NAME}.env"
                  ip link show vxlan-storage >/dev/null
                  ip link show lhnet1-host >/dev/null
                  test "$$(cat /sys/class/net/vxlan-storage/mtu)" = 8950
                  ip -4 address show dev lhnet1-host | grep -Fq "$${NODE_OVERLAY_IP}/24"
            initialDelaySeconds: 2
            periodSeconds: 10
            failureThreshold: 3
          volumeMounts:
            - name: nodemap
              mountPath: /etc/vxlan-nodemap
              readOnly: true
          command:
            - /bin/bash
            - -c
          # NOTE: `$$` escapes Flux postBuild substitution so the literal `$`
          # reaches the container. Flux's envsubst would otherwise strip every
          # `${VAR}` that is not defined in cluster-secrets.
          args:
            - |
              set -euo pipefail

              NODEMAP="/etc/vxlan-nodemap/$${NODE_NAME}.env"
              if [[ ! -r "$${NODEMAP}" ]]; then
                echo "[storage-vxlan] FATAL: no nodemap entry for $${NODE_NAME} at $${NODEMAP}" >&2
                exit 1
              fi
              # shellcheck disable=SC1090
              source "$${NODEMAP}"

              : "$${NODE_VTEP:?}" "$${NODE_OVERLAY_IP:?}" "$${PEER1_VTEP:?}" "$${PEER2_VTEP:?}"

              # Idempotent: create the VXLAN iface only if absent; always refresh
              # MTU / addr / fdb so pod restarts reconcile drift.
              ip link show vxlan-storage >/dev/null 2>&1 || \
                ip link add vxlan-storage type vxlan id 100 local "$${NODE_VTEP}" dstport 4789 nolearning
              ip link set vxlan-storage mtu 8950 up

              # Phase 5b: macvlan host-shim child of vxlan-storage. The host's
              # L3 endpoint for the storage segment moves OFF the bare vxlan
              # parent and ONTO this shim. Reason: the Longhorn iSCSI initiator
              # runs in the host netns and must reach IM pods that are also
              # macvlan children of vxlan-storage. macvlan-bridge isolates
              # parent<->child but ALLOWS child<->child without traversing the
              # parent's egress (which, for vxlan, would encapsulate to remote
              # VTEPs and never reach a local pod). Both NAD-on-parent attempts
              # (macvlan and ipvlan-L2) failed exactly this gate; see plan 0004
              # 2026-04-19 forensics.
              ip link show lhnet1-host >/dev/null 2>&1 || \
                ip link add lhnet1-host link vxlan-storage type macvlan mode bridge
              ip link set lhnet1-host mtu 8950 up

              # Migrate the L3 address from the parent to the shim. The `del ||
              # true` covers both the legacy state (addr on vxlan-storage) and
              # steady-state restarts (already migrated, del fails harmlessly).
              ip addr del "$${NODE_OVERLAY_IP}/24" dev vxlan-storage 2>/dev/null || true
              ip addr replace "$${NODE_OVERLAY_IP}/24" dev lhnet1-host

              # Head-end replication to both peers. Kernel 6.18 rejects
              # `bridge fdb replace` on non-unicast entries ("Cannot replace
              # non-unicast fdb entries"), so idempotency comes from `del
              # ... || true` followed by `append`.
              bridge fdb del    00:00:00:00:00:00 dev vxlan-storage dst "$${PEER1_VTEP}" self 2>/dev/null || true
              bridge fdb del    00:00:00:00:00:00 dev vxlan-storage dst "$${PEER2_VTEP}" self 2>/dev/null || true
              bridge fdb append 00:00:00:00:00:00 dev vxlan-storage dst "$${PEER1_VTEP}" self
              bridge fdb append 00:00:00:00:00:00 dev vxlan-storage dst "$${PEER2_VTEP}" self

              echo "[storage-vxlan] up on $${NODE_NAME} ($${NODE_OVERLAY_IP})"
              exec sleep infinity
      volumes:
        - name: nodemap
          configMap:
            name: storage-vxlan-nodemap
