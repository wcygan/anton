---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: whereabouts-upstream
  namespace: network
spec:
  interval: 1h
  path: ./doc/crds
  prune: true
  wait: true
  timeout: 5m
  sourceRef:
    kind: GitRepository
    name: whereabouts-upstream
    namespace: network
  targetNamespace: network
  patches:
    # Move ServiceAccount to the network namespace
    - target:
        kind: ServiceAccount
        name: whereabouts
      patch: |-
        - op: replace
          path: /metadata/namespace
          value: network
    # Move ConfigMap to the network namespace
    - target:
        kind: ConfigMap
        name: whereabouts-config
      patch: |-
        - op: replace
          path: /metadata/namespace
          value: network
    # Move DaemonSet to the network namespace
    - target:
        kind: DaemonSet
        name: whereabouts
      patch: |-
        - op: replace
          path: /metadata/namespace
          value: network
    # Pin the DaemonSet image tag (upstream ships a floating :latest)
    - target:
        kind: DaemonSet
        name: whereabouts
      patch: |-
        - op: replace
          path: /spec/template/spec/containers/0/image
          # renovate: datasource=docker depName=ghcr.io/k8snetworkplumbingwg/whereabouts
          value: ghcr.io/k8snetworkplumbingwg/whereabouts:v0.9.4@sha256:f279fd7dc1124d7819330fb2e07357990b2b4c5d8733aef1b028573c29f05e14
    # Keep IPAM available during pod-creation bursts. The 2026-04-23 incident
    # did not prove whereabouts OOMKilled, but the pod restarted 10x around the
    # k8s-2 reset and is part of the CNI critical path.
    - target:
        kind: DaemonSet
        name: whereabouts
      patch: |-
        - op: add
          path: /spec/template/spec/priorityClassName
          value: system-node-critical
        - op: replace
          path: /spec/template/spec/containers/0/resources/requests/memory
          value: 128Mi
        - op: replace
          path: /spec/template/spec/containers/0/resources/limits/memory
          value: 512Mi
        # Upstream's 100m CPU limit throttles IPAM during pod-creation bursts.
        # Keep the 100m request and memory bounds while allowing CPU bursting.
        - op: remove
          path: /spec/template/spec/containers/0/resources/limits/cpu
    # Re-point ClusterRoleBinding subject to the relocated ServiceAccount
    - target:
        kind: ClusterRoleBinding
        name: whereabouts
      patch: |-
        - op: replace
          path: /subjects/0/namespace
          value: network
