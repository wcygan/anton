---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: envoy-gateway
spec:
  chartRef:
    kind: OCIRepository
    name: envoy-gateway
  interval: 1h
  values:
    global:
      imageRegistry: mirror.gcr.io
    # Envoy Gateway controller — translates Gateway/HTTPRoute CRs into
    # EnvoyProxy data-plane config. The data-plane priority is set on the
    # EnvoyProxy CR in envoy.yaml, not here.
    deployment:
      priorityClassName: system-cluster-critical
    config:
      envoyGateway:
        provider:
          type: Kubernetes
          kubernetes:
            deploy:
              type: GatewayNamespace
