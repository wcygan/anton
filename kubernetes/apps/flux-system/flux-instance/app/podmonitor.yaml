---
# Flux controllers don't ship a ServiceMonitor — the FluxInstance chart only
# creates Services on port 80 (HTTP API), not on the `http-prom` metrics port.
# A PodMonitor matching the `app.kubernetes.io/part-of: flux` label catches all
# four controllers (source, kustomize, helm, notification) in one shot.
# Discovered by kps's cluster-wide PodMonitor selector.
apiVersion: monitoring.coreos.com/v1
kind: PodMonitor
metadata:
  name: flux-controllers
spec:
  namespaceSelector:
    matchNames:
      - flux-system
  selector:
    matchLabels:
      app.kubernetes.io/part-of: flux
  podMetricsEndpoints:
    - port: http-prom
      interval: 30s
