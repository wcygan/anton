---
# Provides Flux source-controller (and by extension image-automation-controller)
# with HTTPS credentials for the flux-system GitRepository at
# https://github.com/wcygan/anton.git. Without this, push from
# image-automation-controller fails with `authentication required: No anonymous
# write access` and image bumps never land — see plan 0012 / ADR 0024.
#
# Clone of the public repo still works anonymously; the credential is only
# consulted on push. The 1Password item lives in vault `anton`:
#   item:  flux-image-automation-git
#   field: username — GitHub username that owns the PAT
#   field: password — fine-grained PAT scoped to wcygan/anton with
#                     Contents: read/write (and Metadata: read, which is implicit)
#
# Per anton convention, the ClusterSecretStore `onepassword-connect` uses the
# `onepasswordSDK` provider — combined-key syntax `<item>/<field>` only.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: flux-system-git-auth
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: flux-system-git-auth
    creationPolicy: Owner
  data:
    - secretKey: username
      remoteRef:
        key: "flux-image-automation-git/username"
    - secretKey: password
      remoteRef:
        key: "flux-image-automation-git/password"
