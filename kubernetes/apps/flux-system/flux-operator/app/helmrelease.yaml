---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: flux-operator
spec:
  chartRef:
    kind: OCIRepository
    name: flux-operator
  interval: 1h
  values:
    # Match the priority of the controllers it manages — flux-operator
    # reconciles FluxInstance, which produces source/kustomize/helm
    # controllers (already system-cluster-critical via the upstream
    # manifests). Without this, the operator can be evicted while its
    # children keep running, leaving the cluster un-reconcilable.
    priorityClassName: system-cluster-critical
    serviceMonitor:
      create: true
    # Disable the chart's web NetworkPolicy — it only opens 8080/9080 and
    # leaves :8081 (health probes) blocked. Pre-k8s-1.36, kubelet probes
    # bypassed NP enforcement on this cluster; post-upgrade they don't,
    # which sent flux-operator into perma-CrashLoopBackOff. flux-system
    # has no default-deny policy, so removing the chart NP is safe.
    web:
      networkPolicy:
        create: false
