---
apiVersion: image.toolkit.fluxcd.io/v1
kind: ImagePolicy
metadata:
  name: food-site-server
spec:
  imageRepositoryRef:
    name: food-site-server
  filterTags:
    pattern: '^build-static-(?P<run>[0-9]+)-[a-f0-9]+$'
    extract: '$run'
  policy:
    numerical:
      order: asc
  digestReflectionPolicy: IfNotPresent
