---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: food-site-server
  namespace: flux-system
spec:
  interval: 1h
  path: ./kubernetes/apps/food-site/server/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: food-site
  dependsOn:
    - name: envoy-gateway
      namespace: network
    - name: cloudflare-dns
      namespace: network
  wait: false
