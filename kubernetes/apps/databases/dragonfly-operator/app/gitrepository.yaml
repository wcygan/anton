---
# dragonflydb/dragonfly-operator ships its Helm chart inside the source git
# repo under /charts rather than via a HelmRepository or OCI registry. The
# GitRepository source narrows to /charts via the ignore rule so only chart
# files participate in reconciliation.
apiVersion: source.toolkit.fluxcd.io/v1
kind: GitRepository
metadata:
  name: dragonfly-operator
spec:
  interval: 15m
  url: https://github.com/dragonflydb/dragonfly-operator
  ref:
    tag: v1.5.0
  ignore: |
    /*
    !/charts/
