---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: cloudnative-pg
spec:
  interval: 1h
  path: ./kubernetes/apps/databases/cloudnative-pg/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: databases
  # `wait: true` so downstream apps (Harbor's Postgres Cluster CR) can use
  # `dependsOn` to block on the operator being Ready before their CRs apply.
  wait: true
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
