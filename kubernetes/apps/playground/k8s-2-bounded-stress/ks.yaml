---
# UNWIRED AND SUSPENDED - plan 0009 follow-up.
#
# Bounded k8s-2-only stress scaffold. This is intentionally absent from
# kubernetes/apps/playground/kustomization.yaml and has suspend: true. Running
# it is a deliberate maintenance-window action because a reboot is an expected
# possible outcome if k8s-2 has marginal hardware or firmware.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: k8s-2-bounded-stress
spec:
  suspend: true
  interval: 1h
  path: ./kubernetes/apps/playground/k8s-2-bounded-stress/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: playground
  wait: false
