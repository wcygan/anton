---
# UNWIRED AND SUSPENDED - plan 0009 follow-up.
#
# Stronger workload-control scaffold for falsifying "real workload drives the
# k8s-2 reboots." This is intentionally absent from
# kubernetes/apps/playground/kustomization.yaml and also has suspend: true.
# To run it, an operator must both wire this file into the playground
# kustomization and flip suspend to false in a deliberate test window.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: k8s-rejoin-mirrored-load
spec:
  suspend: true
  interval: 1h
  path: ./kubernetes/apps/playground/k8s-rejoin-mirrored-load/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: playground
  wait: false
