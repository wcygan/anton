apiVersion: apps/v1
kind: Deployment
metadata:
  name: homepage
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app.kubernetes.io/name: homepage
  template:
    metadata:
      labels:
        app.kubernetes.io/name: homepage
    spec:
      automountServiceAccountToken: false
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: homepage
          image: ghcr.io/nu-sync/homepage:main-00000025-2a3d587 # {"$imagepolicy": "default:homepage"}
          imagePullPolicy: IfNotPresent
          envFrom:
            - secretRef:
                name: homepage-env
          ports:
            - name: http
              containerPort: 3000
              protocol: TCP
          readinessProbe:
            exec:
              command:
                - /bin/deno
                - eval
                - const r = await fetch("http://127.0.0.1:3000/"); if (!r.ok) Deno.exit(1)
            periodSeconds: 10
          livenessProbe:
            exec:
              command:
                - /bin/deno
                - eval
                - const r = await fetch("http://127.0.0.1:3000/"); if (!r.ok) Deno.exit(1)
            periodSeconds: 30
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
