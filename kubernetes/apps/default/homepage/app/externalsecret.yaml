---
# Runtime configuration for the homepage server. The ClusterSecretStore
# `onepassword-connect` uses the `onepasswordSDK` provider against vault
# `anton`, so remote refs use combined-key syntax: `<item-title>/<field-name>`.
#
# Required 1Password setup:
#   - Vault: anton
#   - Item title: homepage
#   - Fields:
#       public-base-url
#       stripe-secret-key
#       stripe-tip-price-id
#       stripe-webhook-secret
#       resend-api-key
#       resend-from
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: homepage-env
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: homepage-env
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        EMAIL_TRANSPORT: resend
        PUBLIC_BASE_URL: "{{ .publicBaseUrl }}"
        STRIPE_SECRET_KEY: "{{ .stripeSecretKey }}"
        STRIPE_TIP_PRICE_ID: "{{ .stripeTipPriceId }}"
        STRIPE_WEBHOOK_SECRET: "{{ .stripeWebhookSecret }}"
        RESEND_API_KEY: "{{ .resendApiKey }}"
        RESEND_FROM: "{{ .resendFrom }}"
  data:
    - secretKey: publicBaseUrl
      remoteRef:
        key: "homepage/public-base-url"
    - secretKey: stripeSecretKey
      remoteRef:
        key: "homepage/stripe-secret-key"
    - secretKey: stripeTipPriceId
      remoteRef:
        key: "homepage/stripe-tip-price-id"
    - secretKey: stripeWebhookSecret
      remoteRef:
        key: "homepage/stripe-webhook-secret"
    - secretKey: resendApiKey
      remoteRef:
        key: "homepage/resend-api-key"
    - secretKey: resendFrom
      remoteRef:
        key: "homepage/resend-from"
