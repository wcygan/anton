---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: homepage
  namespace: flux-system
spec:
  interval: 1h
  path: ./kubernetes/apps/default/homepage/app
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: default
  # Authors an ExternalSecret, an HTTPRoute on `envoy-external`, a DNSEndpoint
  # on the secondary domain, and a Temporal webhook worker. Block this reconcile
  # on the owning controllers and the Temporal deployment so manifest applies
  # don't race CRDs or start webhook traffic before the in-cluster frontend is
  # Ready. See plan 0016.
  dependsOn:
    - name: external-secrets
      namespace: external-secrets
    - name: envoy-gateway
      namespace: network
    - name: cloudflare-dns
      namespace: network
    - name: temporal
      namespace: temporal
  wait: false
