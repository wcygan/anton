---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: homepage
  namespace: flux-system
spec:
  interval: 1h
  path: ./kubernetes/apps/default/homepage/app
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: default
  # Authors an HTTPRoute on `envoy-external` and a DNSEndpoint on the secondary
  # domain. Block this reconcile on the owning controllers so manifest applies
  # do not race their CRDs. See plan 0016.
  dependsOn:
    - name: envoy-gateway
      namespace: network
    - name: cloudflare-dns
      namespace: network
  wait: false
