---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/kustomize.toolkit.fluxcd.io/kustomization_v1.json
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: echo
  namespace: flux-system
spec:
  interval: 1h
  path: ./kubernetes/apps/default/echo/app
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: default
  # Authors a DNSEndpoint on the secondary domain. Block this reconcile on
  # external-dns (DNSEndpoint CRD owner) being Ready so the manifest apply
  # doesn't race the CRD on a cold-start. See plan 0016.
  dependsOn:
    - name: cloudflare-dns
      namespace: network
  wait: false
