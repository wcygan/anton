---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: external-secrets
spec:
  chartRef:
    kind: OCIRepository
    name: external-secrets
  interval: 1h
  values:
    installCRDs: true
    serviceMonitor:
      enabled: true
    # External-secrets gates secret reconciliation cluster-wide; an eviction
    # under pressure stalls every ExternalSecret. Set per-component because
    # the chart does not expose a single global key.
    priorityClassName: system-cluster-critical
    resources:
      limits:
        memory: 256Mi
      requests:
        cpu: 10m
        memory: 64Mi
    webhook:
      priorityClassName: system-cluster-critical
      resources:
        limits:
          memory: 128Mi
        requests:
          cpu: 10m
          memory: 32Mi
    certController:
      priorityClassName: system-cluster-critical
      resources:
        limits:
          memory: 128Mi
        requests:
          cpu: 10m
          memory: 32Mi
