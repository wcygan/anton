---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: seaweedfs-operator
spec:
  chart:
    spec:
      chart: seaweedfs-operator
      version: 0.1.14
      sourceRef:
        kind: HelmRepository
        name: seaweedfs-operator
      interval: 15m
  interval: 1h
  values:
    # First-commit dance (plan 0005 Phase 2): admission webhook off so the
    # operator + CRDs can land without the validating webhook rejecting its
    # own bootstrap. A follow-up commit flips this to `true` once the
    # operator is Ready and the certgen Job has completed cleanly.
    # ADR 0019 preserves 0016's webhook-bootstrap requirement.
    webhook:
      enabled: false
