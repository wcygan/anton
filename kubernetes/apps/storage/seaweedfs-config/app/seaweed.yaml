---
apiVersion: seaweed.seaweedfs.com/v1
kind: Seaweed
metadata:
  name: seaweedfs
  namespace: storage
spec:
  image: chrislusf/seaweedfs:4.25
  master:
    replicas: 3
    defaultReplication: "000"      # Longhorn owns durability (ADR 0005)
    volumeSizeLimitMB: 30000        # 30 GB per volume file
  volume:
    replicas: 3                     # one per node
    requests:
      storage: 100Gi
    storageClassName: longhorn      # default Longhorn SC; no NAD attachment here
    # Phase 1 scratch shakeout showed `replicas: 3` alone does not spread
    # across nodes (all three landed on k8s-2). Chart 0.1.14's Seaweed CRD
    # does NOT expose `topologySpreadConstraints` on any component, but does
    # expose `affinity` — use podAntiAffinity with the operator's pod labels
    # to force one-per-node. Labels verified against operator source at tag
    # 1.0.12 (internal/controller/controller_volume.go::labelsForVolumeServer):
    # app.kubernetes.io/name=seaweedfs, component=volume, instance=<cr-name>.
    affinity:
      podAntiAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          - topologyKey: kubernetes.io/hostname
            labelSelector:
              matchLabels:
                app.kubernetes.io/name: seaweedfs
                app.kubernetes.io/component: volume
                app.kubernetes.io/instance: seaweedfs
  filer:
    replicas: 2                     # Phase 1 verdict: 2 holds under pod-kill
  s3:
    replicas: 2                     # standalone Deployment HA per ADR 0019
    iam: false                      # explicit override — operator default is true
    configSecret:
      name: seaweedfs-s3-config     # matches ExternalSecret target.name
      key: s3.json                  # matches ExternalSecret target.template.data key
