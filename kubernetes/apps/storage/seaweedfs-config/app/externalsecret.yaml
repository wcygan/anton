---
# ClusterSecretStore `onepassword-connect` uses the `onepasswordSDK` provider
# (vault `anton`), which requires the combined-key syntax "<item-title>/<field-name>"
# — it does NOT accept the `property:` key used by the classic onepassword-connect
# HTTP provider. The 1Password item `seaweedfs-harbor` is pre-existing (reused
# from Harbor groundwork rather than renamed).
#
# Two identities:
#   - admin   — Admin on all buckets. Operational use (weed shell, emergency
#               read/write across buckets). Creds in the item's admin-* fields.
#   - harbor  — Read/Write/List/Tagging scoped to bucket `harbor`. Harbor's
#               registry driver uses this identity (see
#               kubernetes/apps/registries/harbor-config/app/externalsecret-s3.yaml)
#               per ADR 0015's hardening follow-up. Blast radius of a Harbor
#               compromise is then bounded to its own bucket — not the whole
#               SeaweedFS cluster.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: seaweedfs-s3-config
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: seaweedfs-s3-config
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        s3.json: |
          {
            "identities": [
              {
                "name": "admin",
                "actions": ["Admin"],
                "credentials": [
                  { "accessKey": "{{ .adminAccessKey }}", "secretKey": "{{ .adminSecretKey }}" }
                ]
              },
              {
                "name": "harbor",
                "actions": ["Read:harbor", "Write:harbor", "List:harbor", "Tagging:harbor"],
                "credentials": [
                  { "accessKey": "{{ .harborAccessKey }}", "secretKey": "{{ .harborSecretKey }}" }
                ]
              }
            ]
          }
        AWS_ACCESS_KEY_ID: "{{ .adminAccessKey }}"
        AWS_SECRET_ACCESS_KEY: "{{ .adminSecretKey }}"
  data:
    - secretKey: adminAccessKey
      remoteRef:
        key: "seaweedfs-harbor/admin-access-key"
    - secretKey: adminSecretKey
      remoteRef:
        key: "seaweedfs-harbor/admin-secret-key"
    - secretKey: harborAccessKey
      remoteRef:
        key: "seaweedfs-harbor/harbor-access-key"
    - secretKey: harborSecretKey
      remoteRef:
        key: "seaweedfs-harbor/harbor-secret-key"
