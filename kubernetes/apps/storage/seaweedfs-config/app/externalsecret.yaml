---
# ClusterSecretStore `onepassword-connect` uses the `onepasswordSDK` provider
# (vault `anton`), which requires the combined-key syntax "<item-title>/<field-name>"
# — it does NOT accept the `property:` key used by the classic onepassword-connect
# HTTP provider. The 1Password item `seaweedfs-harbor` is pre-existing (reused
# from Harbor groundwork rather than renamed).
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: seaweedfs-s3-config
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: seaweedfs-s3-config
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        s3.json: |
          {
            "identities": [
              {
                "name": "admin",
                "actions": ["Admin"],
                "credentials": [
                  { "accessKey": "{{ .accessKey }}", "secretKey": "{{ .secretKey }}" }
                ]
              }
            ]
          }
  data:
    - secretKey: accessKey
      remoteRef:
        key: "seaweedfs-harbor/admin-access-key"
    - secretKey: secretKey
      remoteRef:
        key: "seaweedfs-harbor/admin-secret-key"
