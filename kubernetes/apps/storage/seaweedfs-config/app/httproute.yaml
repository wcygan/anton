---
# Internal-only per ADR 0019 — no Cloudflare tunnel, no `envoy-external`.
# S3 clients do NOT follow 301 http->https redirects (signed requests break),
# so consumers must use `https://s3.${SECRET_DOMAIN}` directly. In-cluster
# consumers (future Harbor) should target `http://seaweedfs-s3.storage.svc.cluster.local:8333`
# to skip the envoy round-trip.
# `${SECRET_DOMAIN}` is substituted by Flux from the `cluster-secrets` Secret
# via the seaweedfs-config Kustomization's postBuild.substituteFrom.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: seaweedfs-s3
spec:
  parentRefs:
    - name: envoy-internal
      namespace: network
      sectionName: https
  hostnames:
    - s3.${SECRET_DOMAIN}
  rules:
    - backendRefs:
        - name: seaweedfs-s3
          port: 8333
