---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: longhorn
spec:
  interval: 1h
  path: ./kubernetes/apps/storage/longhorn/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: storage
  # Longhorn requires (a) the `longhorn-storage` NAD authored by
  # `longhorn-config` for instance-manager pods' `lhnet1` interface, and (b)
  # the `lhnet1-host` macvlan-bridge child set up by the `storage-vxlan`
  # DaemonSet so the host's iSCSI initiator can reach co-located IM pods. Block
  # this reconcile on both so iSCSI doesn't race the storage fabric on a
  # cold-start. See plan 0016 and `storage/CLAUDE.md`.
  dependsOn:
    - name: longhorn-config
    - name: storage-vxlan
      namespace: network
  # `wait: true` gates every downstream Kustomization that adds
  # `dependsOn: [{name: longhorn, namespace: storage}]` on the Longhorn
  # HelmRelease reaching Ready=True (manager DaemonSet up, CRDs Established,
  # storageClass present). Without this flip the same dep resolves at
  # ks-applied (not Ready) and PVC-creating consumers race the Longhorn
  # bootstrap on cold-start. Plan 0016 Phase 3 task #4. Default Kustomization
  # timeout (5 min) covers a clean Longhorn install; bump to `timeout: 10m`
  # if a future drill shows it's too tight.
  wait: true
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
