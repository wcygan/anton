---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: longhorn
spec:
  chart:
    spec:
      chart: longhorn
      version: 1.11.2
      sourceRef:
        kind: HelmRepository
        name: longhorn
      interval: 15m
  interval: 1h
  values:
    namespaceOverride: storage

    # Talos friction: preUpgradeChecker job fails under Talos' read-only rootfs.
    # Disable per Phase 2 plan tasks (ADR 0005 follow-ups).
    preUpgradeChecker:
      jobEnabled: false
      upgradeVersionCheck: false

    # ADR 0005 defaults. Asymmetric 2+1+2 OSD topology (k8s-1: 2, k8s-2: 1, k8s-3: 2)
    # means 2-replica + best-effort locality will skew toward k8s-1/k8s-3 until the
    # k8s-2 second-NVMe followup lands (tracked in context/hardware.md).
    #
    # createDefaultDiskLabeledNodes: only register default disks on nodes that carry
    # the node.longhorn.io/create-default-disk=config label. Combined with the
    # node.longhorn.io/default-disks-config annotation (both set via Talos machine
    # config), this routes Longhorn onto the declared /var/mnt/longhorn-{1,2}
    # WD_BLACK NVMes instead of the 500 GB Talos EPHEMERAL partition at
    # /var/lib/longhorn/.
    defaultSettings:
      createDefaultDiskLabeledNodes: true
      defaultReplicaCount: 2
      defaultDataLocality: best-effort
      staleReplicaTimeout: 2880
      # Resilience tier 1: when a node goes down hard (kubelet stops reporting),
      # delete both StatefulSet and Deployment pods so workloads can reschedule
      # onto a healthy node and Longhorn can detach + reattach the volume.
      # Default is "do-nothing", which leaves pods stuck Terminating until the
      # node returns. Acceptable here because we run 2-replica volumes and the
      # storage layer can survive a node loss.
      nodeDownPodDeletionPolicy: delete-both-statefulset-and-deployment-pod
      # Wait 30 min before rebuilding a degraded replica onto a different node.
      # Default 600s (10 min) is too aggressive for Talos: a routine machine
      # config apply or upgrade reboot can exceed that and trigger needless
      # cross-node rebuild traffic on the SFP+ mesh. 1800s gives planned
      # reboots room to complete; real node losses still get acted on.
      replicaReplenishmentWaitInterval: 1800
      # Routes replica + iSCSI traffic onto the SFP+ mesh via the NAD in
      # longhorn-config/. Longhorn requires the "<namespace>/<nad>" form,
      # not a bare NAD name. Host-to-local-pod over this network depends
      # on the macvlan host-shim provisioned by storage-vxlan (plan 0004
      # phase 5b); the bare NAD-on-vxlan-parent attempts (macvlan-bridge
      # in ebe62a5c, ipvlan-L2 in 2a4cd478) both broke iSCSI for the
      # exact reason that shim solves.
      storageNetwork: storage/longhorn-storage

    # ServiceMonitor for longhorn-manager metrics (plan 0002 acceptance).
    # Discovered by kps's cluster-wide ServiceMonitor selector.
    metrics:
      serviceMonitor:
        enabled: true

    # Make `longhorn` the cluster's default StorageClass.
    persistence:
      defaultClass: true
      defaultClassReplicaCount: 2
      defaultDataLocality: best-effort
      reclaimPolicy: Delete
