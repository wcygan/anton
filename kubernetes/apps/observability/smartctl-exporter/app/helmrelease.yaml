---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: smartctl-exporter
spec:
  chart:
    spec:
      chart: prometheus-smartctl-exporter
      # renovate: registryUrl=https://prometheus-community.github.io/helm-charts
      version: 0.16.1
      sourceRef:
        kind: HelmRepository
        name: prometheus-community-smartctl
      interval: 15m
  interval: 1h
  # The chart does not expose automountServiceAccountToken. This exporter only
  # reads host devices and serves metrics; it never calls the Kubernetes API.
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: ServiceAccount
              name: smartctl-exporter-prometheus-smartctl-exporter
            patch: |
              - op: add
                path: /automountServiceAccountToken
                value: false
          - target:
              kind: DaemonSet
              name: smartctl-exporter-prometheus-smartctl-exporter-0
            patch: |
              - op: add
                path: /spec/template/spec/automountServiceAccountToken
                value: false
  values:
    image:
      repository: quay.io/prometheuscommunity/smartctl-exporter
      # renovate: datasource=docker depName=quay.io/prometheuscommunity/smartctl-exporter
      tag: v0.14.0@sha256:cfe22c36d7d2fac48ebf619707305acb65eb0fb670656eb80f356e606d782bc1

    # Privileged DaemonSet that mounts /dev to read SMART data via ioctl.
    # Default chart already runs as a DaemonSet; we only override what's needed
    # for Talos: privileged container + tolerate the control-plane taint so
    # the DS schedules on every node in this 3-node all-control-plane cluster.
    securityContext:
      privileged: true
      runAsUser: 0
      runAsNonRoot: false

    # ServiceMonitor: kube-prometheus-stack has match-all selectors
    # (serviceMonitorSelectorNilUsesHelmValues=false), so this is auto-discovered.
    serviceMonitor:
      enabled: true
      interval: 60s

    # Tolerate control-plane taint — anton has 3 control-plane nodes, no workers.
    tolerations:
      - key: node-role.kubernetes.io/control-plane
        operator: Exists
        effect: NoSchedule

    resources:
      requests:
        cpu: 10m
        memory: 32Mi
      limits:
        memory: 128Mi
