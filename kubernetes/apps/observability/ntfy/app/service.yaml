---
# Cluster-internal Service. Alertmanager POSTs here directly via
# http://ntfy.observability.svc.cluster.local/<topic> (URL stored in the
# ntfy-topic Secret and consumed via AlertmanagerConfig.urlSecret). The
# Tailscale Ingress in ingress.yaml fronts the same Service for the iPhone.
apiVersion: v1
kind: Service
metadata:
  name: ntfy
  labels:
    app.kubernetes.io/name: ntfy
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: ntfy
  ports:
    - name: http
      port: 80
      targetPort: http
      protocol: TCP
