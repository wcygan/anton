---
# Pulls the topic-as-secret from 1Password vault `anton`, item `ntfy`,
# field `topic` (long random string per ADR 0026 §Decision). The template
# materialises a fully-formed cluster-internal publish URL so the
# AlertmanagerConfig can reference it via `urlSecret` without ever embedding
# the topic in a manifest. The ClusterSecretStore `onepassword-connect` uses
# the `onepasswordSDK` provider — combined-key syntax `<item>/<field>` only.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: ntfy-topic
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: ntfy-topic
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        topic: "{{ .topic }}"
        # Fully-formed in-cluster publish URL. AlertmanagerConfig's
        # webhookConfigs[].urlSecret reads this key.
        url: "http://ntfy.observability.svc.cluster.local/{{ .topic }}"
  data:
    - secretKey: topic
      remoteRef:
        key: "ntfy/topic"
