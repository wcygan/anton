---
# ntfy server.yml. Mounted at /etc/ntfy/ via the Deployment.
# `${TAILNET_SUFFIX}` (e.g. `<tailnet>.ts.net`) is supplied by `cluster-secrets`
# via Flux postBuild substitution — do not append `.ts.net` separately.
# See ADR 0026 for upstream-base-url rationale (iOS push relay via ntfy.sh —
# only message IDs transit; bodies stay on cluster).
apiVersion: v1
kind: ConfigMap
metadata:
  name: ntfy
data:
  server.yml: |
    base-url: "https://ntfy.${TAILNET_SUFFIX}"
    upstream-base-url: "https://ntfy.sh"
    cache-file: "/var/cache/ntfy/cache.db"
    cache-duration: "12h"
    behind-proxy: true
    # 2026-05-05: enable attachments. ntfy hard-caps inline message body at
    # ~5KiB; larger messages are auto-spilled to attachments. With attachments
    # disabled (the prior default), Alertmanager webhook payloads carrying 2+
    # grouped alerts (e.g. duplicate KubePersistentVolumeFillingUp series)
    # exceeded the inline cap and ntfy returned 40014 "attachments not allowed",
    # which then triggered AlertmanagerClusterFailedToSendAlerts in a loop.
    # 1Gi cache PVC has plenty of room; ntfy auto-prunes after cache-duration.
    attachment-cache-dir: "/var/cache/ntfy/attachments"
    attachment-total-size-limit: "200M"
    attachment-file-size-limit: "5M"
    attachment-expiry-duration: "12h"
