---
# Alertmanager → ntfy wiring. This is the destination ADR 0007 Trigger 4
# was waiting on, formalised by ADR 0026.
#
# CRD version: v1alpha1 only is installed in this cluster (Prometheus
# Operator from kube-prometheus-stack 83.5.0). v1beta1 is upstream-stable
# but not present here; switch when the operator publishes it.
#
# Selector: matched by kps.alertmanagerSpec.alertmanagerConfigSelector via
# the `release: kube-prometheus-stack` label. Same convention every
# PrometheusRule in this directory uses.
#
# Route shape: top-level `route` has receiver=drop, so anything that does
# not match a sub-route is silently dropped (we cannot reuse the chart's
# global "null" receiver from inside an AC CR — receivers are scoped).
# The two sub-routes broaden ADR 0026's initial severity=critical-only
# design to also page on hard node-state alerts, which kps ships at
# severity=warning. Add explicit warning-level alertnames here as the
# allowlist grows; do NOT match all warnings broadly.
#
# Webhook URL contains the secret topic — sourced from the ntfy-topic
# Secret's `url` key (templated by externalsecret.yaml from the 1Password
# `ntfy/topic` field). Using urlSecret instead of url keeps the topic out
# of the manifest entirely.
apiVersion: monitoring.coreos.com/v1alpha1
kind: AlertmanagerConfig
metadata:
  name: ntfy
  labels:
    release: kube-prometheus-stack
spec:
  route:
    receiver: drop
    groupBy: ["alertname", "namespace"]
    groupWait: 30s
    groupInterval: 5m
    repeatInterval: 4h
    routes:
      - receiver: ntfy
        matchers:
          - name: severity
            value: critical
            matchType: "="
      - receiver: ntfy
        matchers:
          - name: alertname
            value: "KubeNodeNotReady|KubeNodeUnreachable|KubeNodeReadinessFlapping"
            matchType: "=~"
  receivers:
    - name: drop
    - name: ntfy
      webhookConfigs:
        - sendResolved: true
          urlSecret:
            name: ntfy-topic
            key: url
