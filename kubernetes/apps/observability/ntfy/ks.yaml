---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: ntfy
spec:
  interval: 1h
  path: ./kubernetes/apps/observability/ntfy/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: observability
  # Authors an ExternalSecret under `app/`. Block this reconcile on
  # `external-secrets` being Ready so the manifest apply doesn't race the CRD
  # on a cold-start. See plan 0016.
  dependsOn:
    - name: external-secrets
      namespace: external-secrets
  wait: false
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
