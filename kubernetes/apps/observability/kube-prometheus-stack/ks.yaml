---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: kube-prometheus-stack
spec:
  interval: 1h
  path: ./kubernetes/apps/observability/kube-prometheus-stack/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: observability
  # Downstream observability apps (smartctl-exporter, nvme-power-collector)
  # need a `Ready` signal from the stack so ServiceMonitor applies do not race
  # the CRDs on cold-start. Check the runtime contract directly instead of
  # `wait: true`: periodic 1Password refresh failures can mark ExternalSecrets
  # unhealthy even when the target Secret already exists and Grafana is running.
  # `dependsOn` adds: `envoy-gateway` for the HTTPRoute under `app/`, and
  # `external-secrets` for the ExternalSecret under `app/`. See plan 0016.
  dependsOn:
    - name: envoy-gateway
      namespace: network
    - name: external-secrets
      namespace: external-secrets
  healthChecks:
    - apiVersion: v1
      kind: Secret
      name: grafana-admin
      namespace: observability
    - apiVersion: helm.toolkit.fluxcd.io/v2
      kind: HelmRelease
      name: kube-prometheus-stack
      namespace: observability
    - apiVersion: gateway.networking.k8s.io/v1
      kind: HTTPRoute
      name: grafana
      namespace: observability
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
