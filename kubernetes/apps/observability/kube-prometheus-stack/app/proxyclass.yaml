---
# Tailscale ProxyClass — kernel-mode networking for Ingress proxies.
#
# Why: the operator defaults Ingress-resource proxies (not Tailscale-ingress
# Services / egress / Connector / ProxyGroup) to userspace netstack
# (TS_USERSPACE=true). Userspace avoids NET_ADMIN/privileged, but caps
# throughput at ~100 Kbps per proxy. On this cluster that surfaces as the
# Grafana SPA never finishing its JS download (~11 KB/s measured over the
# tailnet, vs 13ms RTT direct — latency fine, throughput dead).
#
# Fix: flip the proxy to kernel mode (TS_USERSPACE=false) + privileged so it
# can create /dev/net/tun. Binds per-workload via annotation:
#
#   metadata.annotations:
#     tailscale.com/proxy-class: kernel
#
# Scope: currently only the Grafana Ingress references this. Keep the blast
# radius narrow — do not set this as the operator's default proxyClass.
apiVersion: tailscale.com/v1alpha1
kind: ProxyClass
metadata:
  name: kernel
spec:
  statefulSet:
    pod:
      tailscaleContainer:
        env:
          - name: TS_USERSPACE
            value: "false"
        securityContext:
          privileged: true
