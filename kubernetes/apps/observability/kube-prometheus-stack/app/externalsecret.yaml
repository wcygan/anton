---
# First ExternalSecret in the anton repo. The ClusterSecretStore
# `onepassword-connect` uses the `onepasswordSDK` provider (vault `anton`), which
# requires the combined-key syntax "<item-title>/<field-name>" — it does NOT
# accept the `property:` key used by the classic onepassword-connect HTTP provider.
# See kubernetes/apps/external-secrets/onepassword-store/app/clustersecretstore.yaml
# and .claude/skills/anton-repo-conventions/references/secrets.md.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: grafana-admin
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: grafana-admin
    creationPolicy: Owner
  data:
    - secretKey: admin-user
      remoteRef:
        key: "grafana-admin/username"
    - secretKey: admin-password
      remoteRef:
        key: "grafana-admin/password"
