---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kube-prometheus-stack
spec:
  chart:
    spec:
      chart: kube-prometheus-stack
      version: 83.5.0
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
      interval: 15m
  interval: 1h

  # CRD lifecycle — let the chart's upgrade Job own CRD rollover (chart 68.4.0+).
  # The Job runs before the Helm upgrade, so the Prometheus Operator never sees an
  # un-Established CRD at startup (prometheus-operator #7459). These settings
  # override the cluster-wide defaults in kubernetes/flux/cluster/ks.yaml, which
  # set both install.crds and upgrade.crds to CreateReplace.
  install:
    crds: Create
  upgrade:
    crds: Skip

  values:
    # Chart's own CRD-upgrade Job — gated behind this flag; off by default upstream.
    crds:
      upgradeJob:
        enabled: true

    # ---- Prometheus Operator (defaults; no overrides needed) ----
    prometheusOperator:
      enabled: true

    # ---- Prometheus ----
    prometheus:
      prometheusSpec:
        replicas: 1
        retention: 15d

        # Match-all selectors so ServiceMonitors/PodMonitors/PrometheusRules/Probes
        # from every namespace are discovered without needing per-namespace labels.
        # Without these overrides the chart injects release-scoped selectors that
        # silently drop scrape targets from anton's other charts.
        serviceMonitorSelectorNilUsesHelmValues: false
        podMonitorSelectorNilUsesHelmValues: false
        ruleSelectorNilUsesHelmValues: false
        probeSelectorNilUsesHelmValues: false

        storageSpec:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 50Gi

    # ---- Alertmanager ----
    # Trigger 4 from ADR 0007 fired on 2026-05-04 — destination is now
    # self-hosted ntfy per ADR 0026. Routes are wired via AlertmanagerConfig
    # CRs (e.g. kubernetes/apps/observability/ntfy/app/alertmanagerconfig.yaml),
    # not via .alertmanager.config inline here, so the chart upgrade path stays
    # clean. Do NOT add an inline `.alertmanager.config` block — use an AC CR.
    alertmanager:
      alertmanagerSpec:
        replicas: 1
        # alertmanagerConfigMatcherStrategy.type=None is required for our
        # current single-AC pattern: the prometheus-operator default
        # ("OnNamespace") would auto-scope each AC's route matchers to its own
        # namespace, which silently breaks cluster-wide routing (e.g. our
        # `severity=critical` route would only match alerts from the
        # observability namespace, not anywhere else). Switching to None lets
        # the AlertmanagerConfig CRs use matchers as authored. Future ACs can
        # still scope themselves via explicit `namespace =` matchers.
        alertmanagerConfigMatcherStrategy:
          type: None
        # GOTCHA: prometheus-operator semantics — an empty/unset
        # alertmanagerConfigSelector matches NO AlertmanagerConfig CRs
        # (opposite of standard k8s LabelSelector "{} = match all").
        # Without this, the ntfy AC CR is never merged and the rendered
        # alertmanager.yaml falls back to the chart's null-only receiver,
        # silently dropping every alert. Match the same `release` label that
        # every PrometheusRule already carries.
        alertmanagerConfigSelector:
          matchLabels:
            release: kube-prometheus-stack
        storage:
          volumeClaimTemplate:
            spec:
              storageClassName: longhorn
              accessModes: ["ReadWriteOnce"]
              resources:
                requests:
                  storage: 2Gi

    # ---- Grafana ----
    grafana:
      image:
        # renovate: datasource=docker depName=grafana/grafana
        tag: "12.4.4"
      replicas: 1
      # Single replica on a RWO Longhorn PVC: use Recreate so the old pod
      # releases the volume before the new one starts. The chart default
      # (RollingUpdate, maxSurge 25% -> 1) creates the new pod first and
      # deadlocks on a Multi-Attach error for the RWO volume on every image
      # change. Recreate trades a few seconds of Grafana downtime per upgrade
      # for a rollout that actually completes.
      deploymentStrategy:
        type: Recreate
      # Admin credentials come from the ExternalSecret in this same app directory,
      # which materialises a Secret named `grafana-admin` with keys `admin-user`
      # and `admin-password`. Note: Grafana does not re-read this Secret on rotation
      # — credential rotation requires restarting the Grafana pod
      # (helm-charts #3679). Documented in plan 0002.
      admin:
        existingSecret: grafana-admin
        userKey: admin-user
        passwordKey: admin-password
      persistence:
        enabled: true
        type: pvc
        storageClassName: longhorn
        accessModes: ["ReadWriteOnce"]
        size: 5Gi
      sidecar:
        dashboards:
          enabled: true
          label: grafana_dashboard
          labelValue: "1"
          searchNamespace: ALL
          # Hardening: enforce GitOps-only dashboards at runtime. UI-created
          # dashboards disappear on restart, and the sidecar refuses to delete
          # ConfigMap-sourced ones. Per plan 0002.
          allowUiUpdates: false
          disableDeletion: true
      # Off-LAN access via the Tailscale operator Ingress recipe. Pattern
      # validated on Hubble UI 2026-04-17 after the Cilium `devices: enp+`
      # fix for tailscale/tailscale#12393. See ADR 0012 Consequences.
      # LAN access remains on envoy-internal via httproute.yaml.
      ingress:
        enabled: true
        ingressClassName: tailscale
        hosts: [grafana]
        tls:
          - hosts: [grafana]

    # ---- Control-plane scrape targets Talos does not expose ----
    # Talos hides the static control-plane pods; Cilium replaces kube-proxy on
    # anton. Leaving these enabled produces four permanently-Down targets and
    # noises up /api/v1/targets. Disable explicitly.
    kubeControllerManager:
      enabled: false
    kubeScheduler:
      enabled: false
    kubeProxy:
      enabled: false
    # TODO: verify whether Talos exposes etcd metrics on this cluster; if so,
    # re-enable with the correct endpoint. Disabled for now to keep the smoke
    # test's target set clean (plan 0002).
    kubeEtcd:
      enabled: false

    # ---- kube-state-metrics ----
    # Annotation allowlist — feeds the `PodNADAttachFailed` alert in
    # kubernetes/apps/network/multus/app/prometheusrule.yaml. By default
    # `kube_pod_annotations` is emitted with no annotation labels; the
    # allowlist below promotes the two Multus annotations to labels so a
    # PromQL `unless on(namespace, pod)` set difference can find pods that
    # requested a NAD but never got the Multus reply. Plan 0016 Phase 3.
    #
    # Annotation key → label name transform (kube-state-metrics convention):
    # `k8s.v1.cni.cncf.io/networks`       → `annotation_k8s_v1_cni_cncf_io_networks`
    # `k8s.v1.cni.cncf.io/network-status` → `annotation_k8s_v1_cni_cncf_io_network_status`
    kube-state-metrics:
      extraArgs:
        - --metric-annotations-allowlist=pods=[k8s.v1.cni.cncf.io/networks,k8s.v1.cni.cncf.io/network-status]

    nodeExporter:
      enabled: true

    # Sub-chart values for prometheus-community/prometheus-node-exporter.
    # kube-prometheus-stack passes these straight through under this top-level
    # key (matching the sub-chart name). Two collectors are wired here:
    #   - rapl: Intel Running Average Power Limit. Exposes per-package CPU and
    #     DRAM energy counters from /sys/class/powercap (already mounted via the
    #     chart's default /sys hostPath). Surfaces the post-`idle-mitigations`
    #     thermal floor as actual watts, not just degrees.
    #   - textfile: reads .prom files from a host directory and merges them
    #     into /metrics. Used by the nvme-power-collector DaemonSet to surface
    #     live NVMe NPSS power state (which requires `nvme get-feature`, not
    #     available to node-exporter directly).
    prometheus-node-exporter:
      # extraArgs replaces (does not append to) the parent chart's defaults,
      # so the filesystem.mount-points-exclude and fs-types-exclude entries
      # below must mirror kube-prometheus-stack 83.5.0's
      # prometheus-node-exporter.extraArgs defaults verbatim. Without them,
      # node-exporter scrapes containerd/kubelet bind-mounts and emits a
      # cardinality storm of node_filesystem_* series. Last two args are the
      # only net additions for plan 0009/0013 telemetry.
      extraArgs:
        - --collector.filesystem.mount-points-exclude=^/(dev|proc|sys|run/containerd/.+|var/lib/docker/.+|var/lib/kubelet/.+)($|/)
        - --collector.filesystem.fs-types-exclude=^(autofs|binfmt_misc|bpf|cgroup2?|configfs|debugfs|devpts|devtmpfs|fusectl|hugetlbfs|iso9660|mqueue|nsfs|overlay|proc|procfs|pstore|rpc_pipefs|securityfs|selinuxfs|squashfs|sysfs|tracefs|erofs)$
        - --collector.rapl
        - --collector.textfile.directory=/host/textfile_collector
      extraHostVolumeMounts:
        - name: textfile-collector
          hostPath: /var/lib/node_exporter/textfile_collector
          mountPath: /host/textfile_collector
          readOnly: true
          mountPropagation: HostToContainer
      # RAPL energy_uj sysfs files are mode 0400 root since the 5.10
      # PLATYPUS-attack mitigation (CVE-2020-8694). node-exporter normally
      # runs as nobody and gets EACCES on every read — `node_scrape_collector_success{collector="rapl"} 0`.
      # CAP_DAC_READ_SEARCH was tried first (smallest elevation) but the
      # Talos kernel's RAPL mitigation rejects non-root regardless of DAC,
      # so we need uid=0. runAsUser:0 is preferred over CAP_SYS_ADMIN —
      # narrower attack surface (root in a non-privileged container only
      # gains DAC bypass on the read; no SYS_ADMIN-class operations).
      podSecurityContext:
        runAsUser: 0
        runAsNonRoot: false
      containerSecurityContext:
        runAsUser: 0
        runAsNonRoot: false
