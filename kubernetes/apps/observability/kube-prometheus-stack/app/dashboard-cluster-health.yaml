---
# Grafana sidecar picks this up via `grafana_dashboard=1` label.
# searchNamespace: ALL in the HelmRelease values means this can live anywhere;
# it's co-located here so the dashboard and app churn together.
# Layout: ADR 0013 Phase 1 — header stat strip + 8 rows (all default-expanded).
# Preserve `uid: cluster-health-glance` so existing bookmarks keep working.
# All authoring is in-repo; sidecar has `allowUiUpdates: false` so UI edits
# are discarded on pod restart.
apiVersion: v1
kind: ConfigMap
metadata:
  name: dashboard-cluster-health-glance
  labels:
    grafana_dashboard: "1"
data:
  cluster-health-glance.json: |
    {
      "annotations": { "list": [] },
      "editable": false,
      "schemaVersion": 39,
      "tags": ["anton", "cluster", "health"],
      "time": { "from": "now-6h", "to": "now" },
      "refresh": "30s",
      "timezone": "browser",
      "title": "Cluster Health Glance",
      "uid": "cluster-health-glance",
      "panels": [
        {
          "id": 100,
          "type": "stat",
          "title": "Nodes Ready",
          "gridPos": { "x": 0, "y": 0, "w": 5, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "description": "Count of nodes with Ready=True. Expect 3 on anton.",
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 2 },
                  { "color": "green", "value": 3 }
                ]
              }
            }
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto",
            "textMode": "value",
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "center"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(kube_node_status_condition{condition=\"Ready\",status=\"true\"})",
              "instant": true
            }
          ]
        },
        {
          "id": 101,
          "type": "stat",
          "title": "Pods (non-Running)",
          "gridPos": { "x": 5, "y": 0, "w": 5, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "description": "Pods not in phase=Running. Pending/Failed/Unknown surface here; Succeeded is expected background noise from Jobs.",
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "red", "value": 5 }
                ]
              }
            }
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto",
            "textMode": "value_and_name",
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "auto"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(kube_pod_status_phase{phase=\"Pending\"})",
              "legendFormat": "Pending",
              "instant": true
            },
            {
              "refId": "B",
              "expr": "sum(kube_pod_status_phase{phase=\"Failed\"})",
              "legendFormat": "Failed",
              "instant": true
            },
            {
              "refId": "C",
              "expr": "sum(kube_pod_status_phase{phase=\"Unknown\"})",
              "legendFormat": "Unknown",
              "instant": true
            }
          ]
        },
        {
          "id": 102,
          "type": "stat",
          "title": "Flux Ready %",
          "gridPos": { "x": 10, "y": 0, "w": 5, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "description": "Fraction of flux_resource_info series reporting ready=True. 1.0 means every Kustomization/HelmRelease/source is healthy.",
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 0.9 },
                  { "color": "green", "value": 1 }
                ]
              }
            }
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto",
            "textMode": "value",
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "center"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "count(flux_resource_info{ready=\"True\"}) / count(flux_resource_info)",
              "instant": true
            }
          ]
        },
        {
          "id": 103,
          "type": "stat",
          "title": "API 5xx Rate (5m)",
          "gridPos": { "x": 15, "y": 0, "w": 5, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "description": "apiserver_request_total 5xx share over the last 5 minutes. Red above 1%.",
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "decimals": 3,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.001 },
                  { "color": "red", "value": 0.01 }
                ]
              }
            }
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto",
            "textMode": "value",
            "colorMode": "value",
            "graphMode": "area",
            "justifyMode": "center"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(rate(apiserver_request_total{code=~\"5..\"}[5m])) / clamp_min(sum(rate(apiserver_request_total[5m])), 1)",
              "instant": true
            }
          ]
        },
        {
          "id": 104,
          "type": "stat",
          "title": "Certs Expiring <14d",
          "gridPos": { "x": 20, "y": 0, "w": 4, "h": 4 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "description": "cert-manager certs whose expiration timestamp is within 14 days of now.",
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 1 },
                  { "color": "red", "value": 3 }
                ]
              }
            }
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto",
            "textMode": "value",
            "colorMode": "value",
            "graphMode": "none",
            "justifyMode": "center"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "count(certmanager_certificate_expiration_timestamp_seconds - time() < 14*86400) or vector(0)",
              "instant": true
            }
          ]
        },
        {
          "id": 200,
          "type": "row",
          "title": "Cluster Capacity",
          "collapsed": false,
          "gridPos": { "x": 0, "y": 4, "w": 24, "h": 1 },
          "panels": []
        },
        {
          "id": 1,
          "type": "timeseries",
          "title": "Node CPU %",
          "gridPos": { "x": 0, "y": 5, "w": 8, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 70 },
                  { "color": "red", "value": 90 }
                ]
              }
            }
          },
          "options": { "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"] } },
          "targets": [
            {
              "refId": "A",
              "expr": "100 - (avg by (instance) (rate(node_cpu_seconds_total{mode=\"idle\"}[5m])) * 100)",
              "legendFormat": "{{instance}}"
            }
          ]
        },
        {
          "id": 2,
          "type": "timeseries",
          "title": "Node Memory %",
          "gridPos": { "x": 8, "y": 5, "w": 8, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 75 },
                  { "color": "red", "value": 90 }
                ]
              }
            }
          },
          "options": { "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"] } },
          "targets": [
            {
              "refId": "A",
              "expr": "(1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100",
              "legendFormat": "{{instance}}"
            }
          ]
        },
        {
          "id": 3,
          "type": "bargauge",
          "title": "Node Filesystem Usage %",
          "gridPos": { "x": 16, "y": 5, "w": 8, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "fieldConfig": {
            "defaults": {
              "unit": "percent",
              "min": 0,
              "max": 100,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 75 },
                  { "color": "red", "value": 90 }
                ]
              }
            }
          },
          "options": { "orientation": "horizontal", "displayMode": "gradient", "showUnfilled": true },
          "targets": [
            {
              "refId": "A",
              "expr": "100 - (node_filesystem_avail_bytes{fstype!~\"tmpfs|overlay|squashfs\", mountpoint!~\"/var/lib/kubelet/.*\"} / node_filesystem_size_bytes{fstype!~\"tmpfs|overlay|squashfs\", mountpoint!~\"/var/lib/kubelet/.*\"}) * 100",
              "legendFormat": "{{instance}} {{mountpoint}}",
              "instant": true
            }
          ]
        },
        {
          "id": 201,
          "type": "gauge",
          "title": "Cluster CPU Commit",
          "gridPos": { "x": 0, "y": 13, "w": 12, "h": 6 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "description": "Sum of pod CPU requests / sum of allocatable CPU. >1.0 means the scheduler has committed more than the cluster has.",
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1.5,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.7 },
                  { "color": "red", "value": 0.9 }
                ]
              }
            }
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto",
            "showThresholdLabels": false,
            "showThresholdMarkers": true
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(kube_pod_container_resource_requests{resource=\"cpu\"}) / sum(kube_node_status_allocatable{resource=\"cpu\"})",
              "instant": true
            }
          ]
        },
        {
          "id": 202,
          "type": "gauge",
          "title": "Cluster Memory Commit",
          "gridPos": { "x": 12, "y": 13, "w": 12, "h": 6 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "description": "Sum of pod memory requests / sum of allocatable memory. >1.0 means scheduled memory exceeds cluster allocatable.",
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1.5,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "yellow", "value": 0.7 },
                  { "color": "red", "value": 0.9 }
                ]
              }
            }
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto",
            "showThresholdLabels": false,
            "showThresholdMarkers": true
          },
          "targets": [
            {
              "refId": "A",
              "expr": "sum(kube_pod_container_resource_requests{resource=\"memory\"}) / sum(kube_node_status_allocatable{resource=\"memory\"})",
              "instant": true
            }
          ]
        },
        {
          "id": 250,
          "type": "row",
          "title": "Workload Health",
          "collapsed": false,
          "gridPos": { "x": 0, "y": 19, "w": 24, "h": 1 },
          "panels": []
        },
        {
          "id": 251,
          "type": "bargauge",
          "title": "Deployment Readiness by Namespace",
          "gridPos": { "x": 0, "y": 20, "w": 8, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "description": "Ready replicas / desired replicas, rolled up per namespace. A namespace below 1.0 has at least one Deployment with unavailable replicas.",
          "fieldConfig": {
            "defaults": {
              "unit": "percentunit",
              "min": 0,
              "max": 1,
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "red", "value": null },
                  { "color": "yellow", "value": 0.5 },
                  { "color": "green", "value": 1 }
                ]
              }
            }
          },
          "options": { "orientation": "horizontal", "displayMode": "gradient", "showUnfilled": true },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (namespace)(kube_deployment_status_replicas_ready) / clamp_min(sum by (namespace)(kube_deployment_spec_replicas), 1)",
              "legendFormat": "{{namespace}}",
              "instant": true
            }
          ]
        },
        {
          "id": 252,
          "type": "timeseries",
          "title": "Namespace CPU Usage (top 10)",
          "gridPos": { "x": 8, "y": 20, "w": 8, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "description": "cAdvisor container_cpu_usage_seconds_total rolled up per namespace. Shows actual CPU consumption, not requests.",
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "custom": { "drawStyle": "line", "lineInterpolation": "smooth", "fillOpacity": 20, "stacking": { "mode": "normal" } }
            }
          },
          "options": { "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"] } },
          "targets": [
            {
              "refId": "A",
              "expr": "topk(10, sum by (namespace)(rate(container_cpu_usage_seconds_total{container!=\"\"}[5m])))",
              "legendFormat": "{{namespace}}"
            }
          ]
        },
        {
          "id": 253,
          "type": "timeseries",
          "title": "Namespace Memory Usage (top 10)",
          "gridPos": { "x": 16, "y": 20, "w": 8, "h": 8 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "description": "cAdvisor container_memory_working_set_bytes rolled up per namespace. Working set is what kube-scheduler's OOMKiller looks at.",
          "fieldConfig": {
            "defaults": {
              "unit": "bytes",
              "custom": { "drawStyle": "line", "lineInterpolation": "smooth", "fillOpacity": 20, "stacking": { "mode": "normal" } }
            }
          },
          "options": { "legend": { "displayMode": "table", "placement": "bottom", "calcs": ["mean", "max"] } },
          "targets": [
            {
              "refId": "A",
              "expr": "topk(10, sum by (namespace)(container_memory_working_set_bytes{container!=\"\"}))",
              "legendFormat": "{{namespace}}"
            }
          ]
        },
        {
          "id": 260,
          "type": "stat",
          "title": "Unhealthy Workloads",
          "gridPos": { "x": 0, "y": 28, "w": 8, "h": 3 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "description": "Total count of Deployments + StatefulSets + DaemonSets with ready < desired. 0 (green) = everything at full replica count. Non-zero (red) = drill into the Unhealthy Workloads table below.",
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 1 }
                ]
              },
              "mappings": [
                { "type": "value", "options": { "0": { "text": "0 — healthy" } } }
              ]
            }
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto",
            "textMode": "value",
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "(count((kube_deployment_spec_replicas - kube_deployment_status_replicas_available) > 0) or vector(0)) + (count((kube_statefulset_replicas - kube_statefulset_status_replicas_ready) > 0) or vector(0)) + (count((kube_daemonset_status_desired_number_scheduled - kube_daemonset_status_number_ready) > 0) or vector(0))",
              "instant": true
            }
          ]
        },
        {
          "id": 261,
          "type": "stat",
          "title": "Pods in Bad Waiting State",
          "gridPos": { "x": 8, "y": 28, "w": 8, "h": 3 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "description": "Count of containers currently waiting with a bad reason (CrashLoopBackOff, ImagePullBackOff, ErrImagePull, CreateContainerConfigError). 0 (green) = no stuck containers. Non-zero (red) = drill into the Pods table below.",
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 1 }
                ]
              },
              "mappings": [
                { "type": "value", "options": { "0": { "text": "0 — healthy" } } }
              ]
            }
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto",
            "textMode": "value",
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "count(kube_pod_container_status_waiting_reason{reason=~\"CrashLoopBackOff|ImagePullBackOff|ErrImagePull|CreateContainerConfigError\"} > 0) or vector(0)",
              "instant": true
            }
          ]
        },
        {
          "id": 262,
          "type": "stat",
          "title": "Restart Hotspots (1h)",
          "gridPos": { "x": 16, "y": 28, "w": 8, "h": 3 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "description": "Count of containers that restarted at least once in the last hour. 0 (green) = no active incidents. Non-zero (red) = drill into the Restart Hotspots table below.",
          "fieldConfig": {
            "defaults": {
              "unit": "short",
              "thresholds": {
                "mode": "absolute",
                "steps": [
                  { "color": "green", "value": null },
                  { "color": "red", "value": 1 }
                ]
              },
              "mappings": [
                { "type": "value", "options": { "0": { "text": "0 — healthy" } } }
              ]
            }
          },
          "options": {
            "reduceOptions": { "calcs": ["lastNotNull"], "fields": "", "values": false },
            "orientation": "auto",
            "textMode": "value",
            "colorMode": "background",
            "graphMode": "none",
            "justifyMode": "center"
          },
          "targets": [
            {
              "refId": "A",
              "expr": "count(sum by (namespace, pod, container)(increase(kube_pod_container_status_restarts_total[1h])) > 0) or vector(0)",
              "instant": true
            }
          ]
        },
        {
          "id": 254,
          "type": "table",
          "title": "Unhealthy Workloads (ready < desired)",
          "gridPos": { "x": 0, "y": 31, "w": 12, "h": 7 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "description": "Deployments / StatefulSets / DaemonSets with fewer ready replicas than desired, labelled by kind. Empty table is the healthy steady state — cross-check the 'Unhealthy Workloads' stat above for the green 0.",
          "fieldConfig": {
            "defaults": { "unit": "short", "noValue": "No unhealthy workloads — all replicas at desired count", "custom": { "align": "auto" } },
            "overrides": [
              {
                "matcher": { "id": "byName", "options": "Value" },
                "properties": [
                  { "id": "displayName", "value": "Missing Replicas" },
                  {
                    "id": "thresholds",
                    "value": {
                      "mode": "absolute",
                      "steps": [
                        { "color": "green", "value": null },
                        { "color": "red", "value": 1 }
                      ]
                    }
                  },
                  { "id": "custom.cellOptions", "value": { "type": "color-background" } }
                ]
              }
            ]
          },
          "options": { "showHeader": true, "sortBy": [{ "displayName": "Missing Replicas", "desc": true }] },
          "targets": [
            {
              "refId": "A",
              "expr": "(label_replace((kube_deployment_spec_replicas - kube_deployment_status_replicas_available) > 0, \"kind\", \"Deployment\", \"__name__\", \".*\")) or (label_replace((kube_statefulset_replicas - kube_statefulset_status_replicas_ready) > 0, \"kind\", \"StatefulSet\", \"__name__\", \".*\")) or (label_replace((kube_daemonset_status_desired_number_scheduled - kube_daemonset_status_number_ready) > 0, \"kind\", \"DaemonSet\", \"__name__\", \".*\"))",
              "instant": true,
              "format": "table"
            }
          ],
          "transformations": [
            { "id": "organize", "options": { "excludeByName": { "Time": true, "job": true, "instance": true, "endpoint": true, "service": true, "container": true, "pod": true, "uid": true }, "indexByName": { "kind": 0, "namespace": 1, "deployment": 2, "statefulset": 3, "daemonset": 4, "Value": 5 } } }
          ]
        },
        {
          "id": 255,
          "type": "table",
          "title": "Pods in Bad Waiting State",
          "gridPos": { "x": 12, "y": 31, "w": 12, "h": 7 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "description": "Containers currently waiting with a bad reason (CrashLoopBackOff, ImagePullBackOff, ErrImagePull, CreateContainerConfigError). ContainerCreating / PodInitializing are filtered out — they're transient by design.",
          "fieldConfig": {
            "defaults": { "unit": "short", "noValue": "No pods in bad waiting state", "custom": { "align": "auto" } }
          },
          "options": { "showHeader": true },
          "targets": [
            {
              "refId": "A",
              "expr": "sum by (namespace, pod, container, reason)(kube_pod_container_status_waiting_reason{reason=~\"CrashLoopBackOff|ImagePullBackOff|ErrImagePull|CreateContainerConfigError\"}) > 0",
              "instant": true,
              "format": "table"
            }
          ],
          "transformations": [
            { "id": "organize", "options": { "excludeByName": { "Time": true }, "indexByName": { "namespace": 0, "pod": 1, "container": 2, "reason": 3, "Value": 4 } } }
          ]
        },
        {
          "id": 256,
          "type": "table",
          "title": "Container Restart Hotspots (1h)",
          "gridPos": { "x": 0, "y": 38, "w": 24, "h": 7 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "description": "Containers with restarts in the last hour, top 10. This is the ACTIVE incident surface — contrast with the 24h \"Top Pod Restarts\" table below, which shows stable high-churn pods.",
          "fieldConfig": {
            "defaults": { "unit": "short", "noValue": "No container restarts in the last hour", "custom": { "align": "auto" } },
