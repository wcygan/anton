        {
          "id": 703,
          "type": "timeseries",
          "title": "Cilium Packet Forward / Drop Rate",
          "gridPos": { "x": 16, "y": 97, "w": 8, "h": 7 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
