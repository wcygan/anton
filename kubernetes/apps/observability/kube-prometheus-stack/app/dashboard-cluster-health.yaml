        {
          "id": 702,
          "type": "timeseries",
          "title": "CoreDNS Non-NOERROR Responses",
          "gridPos": { "x": 8, "y": 97, "w": 8, "h": 7 },
          "datasource": { "type": "prometheus", "uid": "prometheus" },
          "description": "Response rate for any rcode other than NOERROR (NXDOMAIN, SERVFAIL, etc.), broken down by rcode.",
          "fieldConfig": {
            "defaults": {
              "unit": "reqps",
