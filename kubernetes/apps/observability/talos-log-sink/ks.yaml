---
# Temporary diagnostic sink for Talos service logs + kernel dmesg from k8s-2.
# Tracked by plan 0007 (k8s-2 instability). Tear down via Phase 5 of the plan
# once the root cause is localized and either fixed or escalated.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: talos-log-sink
spec:
  interval: 1h
  path: ./kubernetes/apps/observability/talos-log-sink/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: observability
  wait: false
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
