---
# Temporary Talos log receiver — Phase 3 of plan 0007. Torn down in Phase 5.
# Scope is narrow: capture service logs (via machine.logging.destinations) and
# kernel dmesg (via the talos.logging.kernel kernel cmdline) to a file on
# Longhorn, read on demand via kubectl exec + tail. No Loki, no Grafana wiring,
# no OTel collector — those are ADR 0008's deferred logging platform, which
# this instrument must not expand into.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: talos-log-sink
spec:
  chart:
    spec:
      chart: vector
      version: 0.57.0
      sourceRef:
        kind: HelmRepository
        name: vector
      interval: 15m
  interval: 1h
  postRenderers:
    - kustomize:
        patches:
          - target:
              kind: StatefulSet
              name: talos-log-sink-vector
            patch: |
              - op: add
                path: /spec/template/spec/automountServiceAccountToken
                value: false
          # Talos routes log traffic over the management, SFP+ underlay/VTEP,
          # or Longhorn host-shim address depending on the active node route.
          # Restrict the LAN LoadBalancer to those node-owned source ranges.
          - target:
              kind: Service
              name: talos-log-sink-vector
            patch: |
              - op: add
                path: /spec/loadBalancerSourceRanges
                value:
                  - 192.168.1.98/32
                  - 192.168.1.99/32
                  - 192.168.1.100/32
                  - 10.100.100.1/32
                  - 10.100.100.2/32
                  - 10.100.100.3/32
                  - 10.100.1.1/32
                  - 10.100.1.2/32
                  - 10.100.1.3/32
                  - 10.100.0.0/29

  values:
    role: Aggregator
    replicas: 1

    # Vector receives Talos logs over sockets and writes them to its PVC. It
    # does not watch Kubernetes resources, so do not project API credentials
    # into the long-lived receiver or its rotator sidecar.
    serviceAccount:
      automountToken: false

    # Keep the sink off the node under investigation so a k8s-2 reboot does not
    # take the receiver with it. Hard-exclude k8s-2; scheduler picks k8s-1 or k8s-3.
    affinity:
      nodeAffinity:
        requiredDuringSchedulingIgnoredDuringExecution:
          nodeSelectorTerms:
            - matchExpressions:
                - key: kubernetes.io/hostname
                  operator: NotIn
                  values: [k8s-2]

    # PVC at /vector-data-dir — the chart's built-in persistence mount point;
    # the file sink writes its rotating log file there.
    # 2026-05-05: bumped 5Gi→30Gi after KubePersistentVolumeFillingUp fired at
    # 6:25 PM CDT (PVC at 2.3% free). Restored kernel sink (commit 35533bdb)
    # generates ~1Gi/day of dmesg + service logs across 3 nodes; 5Gi was sized
    # before the kernel sink restore. 30Gi gives ~30d headroom; rotate CronJob
    # in cronjob.yaml prunes files older than 7d.
    # NOTE: changing persistence.size mutates the StatefulSet's volumeClaimTemplate
    # which is immutable — Helm upgrade will fail unless the STS is first deleted
    # with `kubectl delete sts talos-log-sink-vector -n observability --cascade=orphan`,
    # which leaves the pod and PVC in place. The live PVC was patched directly
    # via Longhorn online-expand; this HR edit is the source-of-truth alignment.
    persistence:
      enabled: true
      size: 30Gi
      storageClassName: longhorn
      accessModes: [ReadWriteOnce]

    # Single Service with mixed TCP + UDP listeners. Pinned LB IP so the
    # Talos machineconfig reference stays stable across Service recreates.
    # Mixed-protocol Services are GA since k8s 1.26 (we're on 1.35) and
    # supported by Cilium L2-announcement.
    service:
      enabled: true
      type: LoadBalancer
      loadBalancerIP: 192.168.1.105
      ports:
        - name: talos-service
          port: 6000
          protocol: TCP
          targetPort: 6000
        - name: talos-kernel
          port: 6001
          protocol: TCP
          targetPort: 6001
        # Plan 0009 / plan 0010 abort follow-up: UDP kernel target pairs
        # with the TCP one on :6001. UDP datagrams flush at write-time and
        # bypass the ~37 s TCP-keepalive cliff observed on every silent
        # reboot — best-effort capture of kernel last words.
        - name: talos-kernel-udp
          port: 6002
          protocol: UDP
          targetPort: 6002

    # Vector config — three sources (TCP service, TCP kernel, UDP kernel),
    # three tagging transforms, one file sink. JSON-lines format is required
    # by Talos service logs; kernel logs arrive as free-form text and get
    # wrapped into JSON by the file sink encoder. Each kernel record carries
    # a `transport` field so post-mortem analysis can tell whether the last
    # pre-reboot record arrived via the keepalive-smeared TCP path or the
    # write-time-flushed UDP path.
    customConfig:
      data_dir: /vector-data-dir
      api:
        enabled: false
      sources:
        talos_service:
          type: socket
          mode: tcp
          address: 0.0.0.0:6000
          decoding:
            codec: json
        talos_kernel:
          type: socket
          mode: tcp
          address: 0.0.0.0:6001
        talos_kernel_udp:
          type: socket
          mode: udp
          address: 0.0.0.0:6002
      transforms:
        tag_service:
          type: remap
          inputs: [talos_service]
          source: |
            .source = "service"
        tag_kernel:
          type: remap
          inputs: [talos_kernel]
          source: |
            .source = "kernel"
            .transport = "tcp"
        tag_kernel_udp:
          type: remap
          inputs: [talos_kernel_udp]
          source: |
            .source = "kernel"
            .transport = "udp"
      sinks:
        file:
          type: file
          inputs: [tag_service, tag_kernel, tag_kernel_udp]
          path: /vector-data-dir/talos-sink-%Y-%m-%d.log
          encoding:
            codec: json

    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        memory: 512Mi

    # Shell-equipped sidecar so the rotation CronJob can clean old log files
    # and operators can run bounded forensic reads against the PVC. The vector
    # container is distroless (no sh/find/ls), so this helper mounts the same
    # data volume. Paired with the `talos-log-sink-rotate` CronJob in
    # rbac.yaml + cronjob.yaml.
    extraContainers:
      - name: rotator
        # renovate: datasource=docker depName=busybox
        image: busybox:1.37.0@sha256:9532d8c39891ca2ecde4d30d7710e01fb739c87a8b9299685c63704296b16028
        command: [sh, -c, "trap 'exit 0' TERM; sleep infinity & wait"]
        resources:
          requests:
            cpu: 5m
            memory: 64Mi
          limits:
            memory: 256Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop: [ALL]
        volumeMounts:
          - name: data
            mountPath: /vector-data-dir
