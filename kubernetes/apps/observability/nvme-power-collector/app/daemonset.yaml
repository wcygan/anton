---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: nvme-power-collector
  namespace: observability
  labels:
    app.kubernetes.io/name: nvme-power-collector
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: nvme-power-collector
  updateStrategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 1
  template:
    metadata:
      labels:
        app.kubernetes.io/name: nvme-power-collector
    spec:
      serviceAccountName: nvme-power-collector
      automountServiceAccountToken: false
      priorityClassName: system-node-critical
      hostPID: false
      # 3-node all-control-plane cluster: tolerate the control-plane taint so
      # the DS schedules on every node. Mirrors idle-mitigations.
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
      containers:
        - name: collector
          # Alpine + nvme-cli/msr-tools installed at startup. ~5s init penalty per pod
          # (one apk add fetch), then a tight sleep loop. Avoids a custom
          # image-build pipeline; if the apk fetch becomes flaky we can
          # promote to a built image via the deploy-owned-app pipeline.
          # renovate: datasource=docker depName=alpine
          image: alpine:3.23.4
          imagePullPolicy: IfNotPresent
          securityContext:
            # Privileged required for /dev/nvme* ioctl (NVMe admin commands
            # need CAP_SYS_ADMIN + CAP_SYS_RAWIO; full privileged is the
            # simplest path on Talos's SELinux-enforced kernel surface).
            privileged: true
            runAsNonRoot: false
            runAsUser: 0
          resources:
            requests:
              cpu: 5m
              memory: 16Mi
            limits:
              memory: 64Mi
          volumeMounts:
            - name: dev
              mountPath: /dev
            - name: textfile
              mountPath: /tf
          command: ["/bin/sh", "-c"]
          args:
            - |
              set -eu

              echo "[nvme-power-collector] starting on $(hostname)"

              # Install collection tools at runtime. Cached on subsequent restarts
              # via the alpine package layer if the image is in spegel; cold cache
              # adds ~5s. Failure here is fatal — without these tools the
              # textfile would silently stay incomplete. Alpine 3.20 carries
              # msr-tools only in edge/testing, so add that repository just for
              # the tiny rdmsr/wrmsr package.
              apk add --no-cache nvme-cli >/dev/null
              apk add --no-cache --repository=https://dl-cdn.alpinelinux.org/alpine/edge/testing msr-tools >/dev/null
              echo "[nvme-power-collector] nvme-cli + msr-tools ready"

              online_cpus() {
                tr ',' '\n' < /sys/devices/system/cpu/online | while read -r part; do
                  [ -n "$part" ] || continue
                  case "$part" in
                    *-*)
                      start=${part%-*}
                      end=${part#*-}
                      cpu=$start
                      while [ "$cpu" -le "$end" ]; do
                        printf '%s\n' "$cpu"
                        cpu=$((cpu + 1))
                      done
                      ;;
                    *)
                      printf '%s\n' "$part"
                      ;;
                  esac
                done
              }

              emit_msr_throttle_reasons() {
                cpu=$1
                raw=$(rdmsr -p "$cpu" 0x64f 2>/dev/null) || return 0
                case "$raw" in
                  ''|*[!0-9a-fA-F]*) return 0 ;;
                esac

                value=$((0x$raw))
                for pair in \
                  0:PROCHOT \
                  1:thermal \
                  4:PL1 \
                  5:PL2 \
                  6:max-turbo \
                  9:core-power; do
                  bit=${pair%%:*}
                  reason=${pair#*:}
                  active=$(((value >> bit) & 1))
                  printf 'node_cpu_msr_throttle_reason{cpu="%s",reason="%s"} %s\n' "$cpu" "$reason" "$active"
                done
              }

              # Atomic-write loop: each iteration writes a .tmp file then
              # renames it over .prom so node-exporter never reads a partial
              # file. 30 s cadence matches betty's scrape interval.
              msr_missing_logged=0
              while true; do
                tmp=/tf/nvme_power.prom.tmp
                : > "$tmp"
                printf '# HELP node_nvme_power_state Current NVMe NPSS power state (lower index = higher power draw)\n' >> "$tmp"
                printf '# TYPE node_nvme_power_state gauge\n' >> "$tmp"
                printf '# HELP node_cpu_msr_throttle_reason Intel MSR 0x64F active package/core throttle reason bit decoded per online CPU (0=PROCHOT, 1=thermal, 4=PL1, 5=PL2, 6=max-turbo, 9=core-power)\n' >> "$tmp"
                printf '# TYPE node_cpu_msr_throttle_reason gauge\n' >> "$tmp"

                for d in /dev/nvme[0-9] /dev/nvme[0-9][0-9]; do
                  [ -e "$d" ] || continue
                  dev=$(basename "$d")
                  # nvme-cli prints "Current value:0xNNNNNNNN" with NO space
                  # after the colon, so awk $NF returns "value:0x..." not
                  # "0x...". Use sed with an anchored capture group to extract
                  # just the hex literal, then printf %d to convert to decimal.
                  raw=$(nvme get-feature -f 0x02 "$d" 2>/dev/null | sed -n 's/.*Current value:[[:space:]]*0x\([0-9a-fA-F][0-9a-fA-F]*\).*/\1/p')
                  case "$raw" in
                    ''|*[!0-9a-fA-F]*) continue ;;
                  esac
                  # NVMe spec, Feature ID 02h: bits 4:0 are the actual PS index;
                  # bits 7:5 are Workload Hint; higher bits reserved. Some drives
                  # (Crucial CT500P3SSD8 observed) reply with WH bits set even
                  # when PS=0, returning e.g. 0x40 — without the mask we'd emit
                  # PS=64. Mask to PS bits only.
                  full=$(printf '%d' "0x$raw" 2>/dev/null) || continue
                  ps=$((full & 0x1F))
                  printf 'node_nvme_power_state{device="%s"} %s\n' "$dev" "$ps" >> "$tmp"
                done

                # Plan 0013 evidence from 2026-05-06 02:30-04:30 CDT: k8s-2
                # throttled at 52 °C / 0.47 GHz with peer-identical PL1. MSR
                # 0x64F distinguishes PROCHOT/VRM-side assertion from thermal
                # or package-limit causes.
                if [ -e /dev/cpu/0/msr ]; then
                  msr_missing_logged=0
                  for cpu in $(online_cpus); do
                    [ -e "/dev/cpu/$cpu/msr" ] || continue
                    emit_msr_throttle_reasons "$cpu" >> "$tmp"
                  done
                elif [ "$msr_missing_logged" -eq 0 ]; then
                  echo "[nvme-power-collector] /dev/cpu/0/msr missing; load the Talos msr kernel module before node_cpu_msr_throttle_reason can emit"
                  msr_missing_logged=1
                fi

                mv "$tmp" /tf/nvme_power.prom
                sleep 30
              done
      volumes:
        - name: dev
          hostPath:
            path: /dev
            type: Directory
        - name: textfile
          hostPath:
            # Same path the kube-prometheus-stack sub-chart mounts read-only
            # at /host/textfile_collector via the textfile collector arg.
            # DirectoryOrCreate so the first DaemonSet pod on a fresh node
            # creates the directory; subsequent pods reuse it.
            path: /var/lib/node_exporter/textfile_collector
            type: DirectoryOrCreate
