---
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: harbor-config
spec:
  interval: 1h
  path: ./kubernetes/apps/registries/harbor-config/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: registries
  # harbor-config authors resources that consume two CRDs installed by the
  # operators in the `databases` namespace (CNPG `Cluster` and DragonflyDB
  # `Dragonfly`). Block reconcile until both operators are Ready.
  dependsOn:
    - name: cloudnative-pg
      namespace: databases
    - name: dragonfly-operator
      namespace: databases
    # `external-secrets` gates the two ExternalSecrets (admin password, S3
    # creds) authored under `app/` — blocks manifest apply on the CRD being
    # installed. See plan 0016.
    - name: external-secrets
      namespace: external-secrets
  # Check the resources Harbor actually consumes. Using `wait: true` here also
  # health-checks the ExternalSecrets themselves, so a periodic 1Password
  # refresh failure blocks Harbor even when the target Secrets already exist.
  healthChecks:
    - apiVersion: v1
      kind: Secret
      name: harbor-admin-secret
      namespace: registries
    - apiVersion: v1
      kind: Secret
      name: harbor-s3-creds
      namespace: registries
    - apiVersion: postgresql.cnpg.io/v1
      kind: Cluster
      name: harbor-postgres
      namespace: registries
    - apiVersion: dragonflydb.io/v1alpha1
      kind: Dragonfly
      name: harbor-redis
      namespace: registries
    - apiVersion: networking.k8s.io/v1
      kind: Ingress
      name: registry-tailscale
      namespace: registries
  postBuild:
    substituteFrom:
      - name: cluster-secrets
        kind: Secret
