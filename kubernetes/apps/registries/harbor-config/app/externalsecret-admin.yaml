---
# Admin password for Harbor's `admin` user. Pulled from 1Password vault
# `anton`, item `harbor-admin`, field `admin-password`.
#
# Operator setup (one-time, required before this ExternalSecret resolves):
#   1. In vault `anton`, create a new "Login" item titled `harbor-admin`.
#   2. Add a password field named `admin-password` with a strong generated
#      value (≥16 chars, mixed case, digit, symbol — Harbor 2.x rejects
#      weak admin passwords at login).
#   3. Save. ESO's 1h refresh will pick it up, or force a reconcile with
#      `kubectl -n registries annotate externalsecret harbor-admin-secret
#      force-sync=$(date +%s) --overwrite`.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: harbor-admin-secret
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: harbor-admin-secret
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # Harbor chart references this key via
        # `existingSecretAdminPasswordKey: HARBOR_ADMIN_PASSWORD`.
        HARBOR_ADMIN_PASSWORD: "{{ .adminPassword }}"
  data:
    - secretKey: adminPassword
      remoteRef:
        key: "harbor-admin/admin-password"
