---
# S3 credentials for Harbor's registry storage driver against SeaweedFS.
# Uses the bucket-scoped `harbor` SeaweedFS identity (Read/Write/List/
# Tagging on bucket `harbor` only, per
# kubernetes/apps/storage/seaweedfs-config/app/externalsecret.yaml).
# ADR 0015 hardening follow-up implemented 2026-04-21. Earlier versions
# of this manifest reused the SeaweedFS admin creds; the switch happened
# without data migration because Harbor's existing blobs in bucket
# `harbor` are readable by the new scoped identity.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: harbor-s3-creds
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: harbor-s3-creds
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # Keys defined by Harbor's registry chart contract — see
        # https://github.com/goharbor/harbor-helm values.yaml under
        # `persistence.imageChartStorage.s3.existingSecret`.
        REGISTRY_STORAGE_S3_ACCESSKEY: "{{ .accessKey }}"
        REGISTRY_STORAGE_S3_SECRETKEY: "{{ .secretKey }}"
  data:
    - secretKey: accessKey
      remoteRef:
        key: "seaweedfs-harbor/harbor-access-key"
    - secretKey: secretKey
      remoteRef:
        key: "seaweedfs-harbor/harbor-secret-key"
