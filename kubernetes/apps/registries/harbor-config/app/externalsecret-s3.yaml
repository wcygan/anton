---
# S3 credentials for Harbor's registry storage driver against SeaweedFS.
# Reuses the existing `seaweedfs-harbor` 1Password item (admin identity,
# same as the `storage/seaweedfs-s3-config` Secret — see plan 0006 Phase 1
# credential-scope decision). Reshaped into the key names Harbor's registry
# chart expects.
#
# Per-consumer least-privilege (a dedicated `harbor` SeaweedFS identity
# scoped to bucket `harbor`) is flagged as a hardening follow-up in plan
# 0006 Phase 7, triggered when a second SeaweedFS consumer arrives.
apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: harbor-s3-creds
spec:
  refreshInterval: 1h
  secretStoreRef:
    kind: ClusterSecretStore
    name: onepassword-connect
  target:
    name: harbor-s3-creds
    creationPolicy: Owner
    template:
      engineVersion: v2
      data:
        # Keys defined by Harbor's registry chart contract — see
        # https://github.com/goharbor/harbor-helm values.yaml under
        # `persistence.imageChartStorage.s3.existingSecret`.
        REGISTRY_STORAGE_S3_ACCESSKEY: "{{ .accessKey }}"
        REGISTRY_STORAGE_S3_SECRETKEY: "{{ .secretKey }}"
  data:
    - secretKey: accessKey
      remoteRef:
        key: "seaweedfs-harbor/admin-access-key"
    - secretKey: secretKey
      remoteRef:
        key: "seaweedfs-harbor/admin-secret-key"
