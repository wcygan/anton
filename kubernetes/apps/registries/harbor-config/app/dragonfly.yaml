---
apiVersion: dragonflydb.io/v1alpha1
kind: Dragonfly
metadata:
  name: harbor-redis
spec:
  replicas: 3
  image: docker.dragonflydb.io/dragonflydb/dragonfly:v1.39.0
  # The operator's generated policy leaves Redis open to every source. Keep
  # policy ownership in GitOps so Harbor and operator access stay explicit.
  networkPolicyEnabled: false

  affinity:
    podAntiAffinity:
      requiredDuringSchedulingIgnoredDuringExecution:
        - topologyKey: kubernetes.io/hostname
          labelSelector:
            matchLabels:
              app: harbor-redis
              app.kubernetes.io/name: dragonfly
              app.kubernetes.io/part-of: dragonfly

  resources:
    requests:
      cpu: 100m
      memory: 256Mi
    limits:
      cpu: 500m
      memory: 512Mi

  args:
    # Harbor's redis usage is light (session + cache); 256MB is plenty.
    - --maxmemory=256mb
    # Single proactor thread is adequate for Harbor's traffic pattern.
    - --proactor_threads=1
