---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: homepage-log-agent
  annotations:
    reloader.stakater.com/auto: "true"
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: homepage-log-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: homepage-log-agent
        app.kubernetes.io/part-of: clickstack
    spec:
      serviceAccountName: homepage-log-agent
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      initContainers:
        - name: prepare-file-storage
          # renovate: datasource=docker depName=busybox
          image: busybox:1.37.0
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - chown -R 10001:10001 /var/lib/otelcol/file_storage
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsUser: 0
            runAsGroup: 0
            capabilities:
              drop: [ALL]
              add: [CHOWN]
          volumeMounts:
            - name: file-storage
              mountPath: /var/lib/otelcol/file_storage
      containers:
        - name: otelcol
          image: ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-k8s:0.146.1
          imagePullPolicy: IfNotPresent
          args:
            - --config=/conf/collector.yaml
          env:
            - name: CLICKSTACK_INGESTION_API_KEY
              valueFrom:
                secretKeyRef:
                  name: clickstack-credentials
                  key: HYPERDX_API_KEY
          ports:
            - name: health
              containerPort: 13133
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: health
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: health
            periodSeconds: 30
          resources:
            requests:
              cpu: 25m
              memory: 96Mi
            limits:
              cpu: 200m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsUser: 10001
            runAsGroup: 10001
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: config
              mountPath: /conf
              readOnly: true
            - name: pod-logs
              mountPath: /var/log/pods
              readOnly: true
            - name: file-storage
              mountPath: /var/lib/otelcol/file_storage
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: homepage-log-agent-config
            items:
              - key: collector.yaml
                path: collector.yaml
        - name: pod-logs
          hostPath:
            path: /var/log/pods
            type: Directory
        - name: file-storage
          hostPath:
            path: /var/lib/otelcol/homepage-log-agent
            type: DirectoryOrCreate
        - name: tmp
          emptyDir: {}
