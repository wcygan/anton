---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: homepage-log-agent
spec:
  selector:
    matchLabels:
      app.kubernetes.io/name: homepage-log-agent
  template:
    metadata:
      labels:
        app.kubernetes.io/name: homepage-log-agent
        app.kubernetes.io/part-of: clickstack
    spec:
      serviceAccountName: homepage-log-agent
      automountServiceAccountToken: false
      securityContext:
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: otelcol
          image: ghcr.io/open-telemetry/opentelemetry-collector-releases/opentelemetry-collector-k8s:0.146.1
          imagePullPolicy: IfNotPresent
          args:
            - --config=/conf/collector.yaml
          env:
            - name: CLICKSTACK_INGESTION_API_KEY
              valueFrom:
                secretKeyRef:
                  name: clickstack-credentials
                  key: HYPERDX_API_KEY
          ports:
            - name: health
              containerPort: 13133
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /
              port: health
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: health
            periodSeconds: 30
          resources:
            requests:
              cpu: 25m
              memory: 96Mi
            limits:
              cpu: 200m
              memory: 256Mi
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: [ALL]
          volumeMounts:
            - name: config
              mountPath: /conf
              readOnly: true
            - name: pod-logs
              mountPath: /var/log/pods
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: config
          configMap:
            name: homepage-log-agent-config
            items:
              - key: collector.yaml
                path: collector.yaml
        - name: pod-logs
          hostPath:
            path: /var/log/pods
            type: Directory
        - name: tmp
          emptyDir: {}
