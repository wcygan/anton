---
apiVersion: v1
kind: ConfigMap
metadata:
  name: homepage-log-agent-config
data:
  collector.yaml: |
    extensions:
      file_storage:
        directory: /var/lib/otelcol/file_storage
        create_directory: true
      health_check:
        endpoint: 0.0.0.0:13133

    receivers:
      filelog/homepage_worker:
        include:
          - /var/log/pods/default_homepage-worker*/*/*.log
        include_file_name: false
        include_file_path: true
        start_at: beginning
        storage: file_storage
        operators:
          - id: container-parser
            type: container
            max_log_size: 102400
          - id: logtape-json
            type: json_parser
            if: body matches "^\\{"
            parse_from: body
            parse_to: attributes
            on_error: send

    processors:
      memory_limiter:
        check_interval: 5s
        limit_mib: 192
        spike_limit_mib: 64
      resource/homepage_worker:
        attributes:
          - action: upsert
            key: service.name
            value: homepage-worker
          - action: upsert
            key: service.namespace
            value: homepage
          - action: upsert
            key: k8s.namespace.name
            value: default
          - action: upsert
            key: k8s.deployment.name
            value: homepage-worker
      transform/homepage_logtape:
        error_mode: ignore
        log_statements:
          - context: log
            statements:
              - set(log.body, log.attributes["message"]) where log.attributes["message"] != nil
              - set(log.severity_text, log.attributes["level"]) where log.attributes["level"] != nil
      batch: {}

    exporters:
      otlp_http/clickstack:
        endpoint: http://clickstack-otel-collector.clickstack.svc.cluster.local:4318
        compression: gzip
        headers:
          authorization: ${env:CLICKSTACK_INGESTION_API_KEY}

    service:
      extensions:
        - file_storage
        - health_check
      pipelines:
        logs/homepage_worker:
          receivers:
            - filelog/homepage_worker
          processors:
            - memory_limiter
            - resource/homepage_worker
            - transform/homepage_logtape
            - batch
          exporters:
            - otlp_http/clickstack
