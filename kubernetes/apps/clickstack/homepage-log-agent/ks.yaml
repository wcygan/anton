---
# Narrow ClickStack test source for ADR 0028: collect homepage worker and
# server pod logs and forward them to the bundled ClickStack OTLP gateway. This
# keeps the experiment useful without turning ClickStack into cluster-wide
# observability.
apiVersion: kustomize.toolkit.fluxcd.io/v1
kind: Kustomization
metadata:
  name: homepage-log-agent
spec:
  interval: 1h
  dependsOn:
    - name: clickstack-app
  path: ./kubernetes/apps/clickstack/homepage-log-agent/app
  prune: true
  sourceRef:
    kind: GitRepository
    name: flux-system
    namespace: flux-system
  targetNamespace: clickstack
  healthChecks:
    - apiVersion: apps/v1
      kind: DaemonSet
      name: homepage-log-agent
      namespace: clickstack
