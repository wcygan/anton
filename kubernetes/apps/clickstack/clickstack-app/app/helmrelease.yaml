---
# Phase 2 of the two-phase ClickStack install (ADR 0028). Evaluates ClickStack
# as-shipped: bundled ClickHouse + Keeper + OTel collector + MongoDB + HyperDX.
# Release name `clickstack`; the chart's `clickstack.hyperdx.fullname` helper
# appends `-app`, so the HyperDX Deployment and Service render as
# `clickstack-app` (the HTTPRoute backendRef and ks.yaml healthCheck reference
# that name). A top-level fullnameOverride is deliberately NOT used: the helper
# would also rename ClickHouse/Keeper/MongoDB while the OTel service name stays
# release-name-derived, desyncing the chart's internal service wiring.
#
# 60-day throwaway learning eval — single-replica ClickHouse/Keeper is fine.
# Containment per ADR 0028: own namespace only, no Prometheus->ClickHouse
# bridge, no ServiceMonitor forking prod metrics, explicit ClickHouse limits,
# UI via envoy-internal HTTPRoute only.
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: clickstack
spec:
  releaseName: clickstack
  chart:
    spec:
      chart: clickstack
      # Pinned per ADR 0028 — young chart (appVersion 2.27.0), single published
      # version. No ranges; Renovate owns the bump.
      version: 3.0.0
      sourceRef:
        kind: HelmRepository
        name: clickstack-charts
      interval: 15m
  interval: 1h
  # The four runtime credentials have NO chart-native existingSecret hook — they
  # are plain Helm values under hyperdx.secrets.*. ESO writes them into
  # `clickstack-credentials`; Flux injects each into the values tree via
  # valuesFrom + targetPath, overriding the chart's weak default passwords
  # (ADR 0028). The ESO Secret is deliberately NOT named `clickstack-secret`:
  # the chart's hyperdx/secret.yaml template unconditionally renders its own
  # `clickstack-secret` (because hyperdx.secrets stays non-nil), so an ESO
  # target of the same name would make ESO and Helm fight to own one Secret.
  # The chart reads these values via Helm templating, never the ESO Secret by
  # name, so the ESO Secret name is free to differ.
  valuesFrom:
    - kind: Secret
      name: clickstack-credentials
      valuesKey: HYPERDX_API_KEY
      targetPath: hyperdx.secrets.HYPERDX_API_KEY
    - kind: Secret
      name: clickstack-credentials
      valuesKey: CLICKHOUSE_PASSWORD
      targetPath: hyperdx.secrets.CLICKHOUSE_PASSWORD
    - kind: Secret
      name: clickstack-credentials
      valuesKey: CLICKHOUSE_APP_PASSWORD
      targetPath: hyperdx.secrets.CLICKHOUSE_APP_PASSWORD
    - kind: Secret
      name: clickstack-credentials
      valuesKey: MONGODB_PASSWORD
      targetPath: hyperdx.secrets.MONGODB_PASSWORD
  values:
    hyperdx:
      # External URL HyperDX uses to build login/OAuth redirects. The chart
      # default is http://localhost:3000, which makes the UI bounce off-box
      # users to localhost. We canonicalize on the tailnet URL since access is
      # via the tailscale IngressClass. `${TAILNET_SUFFIX}` is substituted by
      # Flux postBuild from cluster-secrets (same pattern as observability/ntfy),
      # so the literal tailnet name never lands in git. Deep-merges over the
      # chart's hyperdx.config defaults — only FRONTEND_URL is overridden.
      # NOTE: the on-LAN envoy-internal route (hyperdx.${SECRET_DOMAIN}) will now
      # redirect login to the tailnet origin; tailnet is the primary access path.
      config:
        FRONTEND_URL: "https://hyperdx.${TAILNET_SUFFIX}"
        # Keep the eval dataset focused on explicit test signals. The chart's
        # default points the HyperDX API at the bundled collector, which makes
        # the Logs source live-tail hdx-oss-api health checks and UI query
        # traffic instead of the onboarded workloads.
        OTEL_EXPORTER_OTLP_ENDPOINT: ""
      # ClusterIP UI/API service; exposure is via Gateway API HTTPRoute, not the
      # chart Ingress. Disabled explicitly (already the v3.0.0 default).
      service:
        type: ClusterIP
      ingress:
        enabled: false
      # The data-source config (connections.json / sources.json) hook is SEPARATE
      # from the four passwords above and is NOT used here — leave HyperDX to seed
      # its own sources for the eval.
      deployment:
        useExistingConfigSecret: false

    # Bundled components — evaluate ClickStack as-shipped (ADR 0028).
    clickhouse:
      enabled: true
      cluster:
        spec:
          containerTemplate:
            # Explicit ClickHouse resource limits are an ADR 0028 hard requirement
            # (containment). Compute is separate from storage below.
            resources:
              requests:
                cpu: "1"
                memory: 4Gi
              limits:
                cpu: "4"
                memory: 8Gi
          dataVolumeClaimSpec:
            resources:
              requests:
                storage: 20Gi
          # The retention CronJob below uses the existing collector user and
          # needs only TTL-specific ALTER privileges to keep ClickStack's own
          # telemetry tables bounded after table recreation.
          settings:
            extraUsersConfig:
              users:
                otelcollector:
                  grants:
                    - query: "GRANT SELECT,INSERT,CREATE,SHOW,ALTER TTL,ALTER MATERIALIZE TTL ON default.*"
      keeper:
        spec:
          # KeeperCluster supports the image through its container template.
          # Keep the currently running official 26.5.1.882 build, but make the
          # version and digest explicit instead of tracking the mutable latest tag.
          containerTemplate:
            image:
              repository: docker.io/clickhouse/clickhouse-keeper:26.5.1.882
              hash: sha256:1264096f8c73a3e2fbc62cbbaa8cb83089edb4129c2d50f1b9e14c8fb1923cb3
          dataVolumeClaimSpec:
            resources:
              requests:
                storage: 5Gi

    mongodb:
      enabled: true
      # The chart renders only `mongodb.spec` verbatim into the MongoDBCommunity
      # CR — a top-level `mongodb.resources` key is read by no template and has
      # no effect. Resources for the mongod container go through the CRD's
      # statefulSet override (spec.statefulSet.spec.template.spec.containers,
      # container name `mongod`). The data/log volume sizes live in
      # volumeClaimTemplates; keep them explicit so the learning experiment does
      # not silently inherit the operator's small 10G/2G defaults.
      spec:
        statefulSet:
          spec:
            volumeClaimTemplates:
              - metadata:
                  name: data-volume
                  labels:
                    recurring-job-group.longhorn.io/clickstack-critical: enabled
                spec:
                  accessModes:
                    - ReadWriteOnce
                  resources:
                    requests:
                      storage: 50Gi
              - metadata:
                  name: logs-volume
                  labels:
                    recurring-job-group.longhorn.io/clickstack-critical: enabled
                spec:
                  accessModes:
                    - ReadWriteOnce
                  resources:
                    requests:
                      storage: 5Gi
            template:
              spec:
                containers:
                  - name: mongod
                    resources:
                      requests:
                        cpu: 250m
                        memory: 512Mi
                      limits:
                        cpu: "1"
                        memory: 1Gi

    # Deployment-mode collector (NOT a daemonset): receives app telemetry via
    # OTLP (4317 gRPC / 4318 HTTP) and writes to ClickHouse. It does not scrape
    # pod logs by default — wiring the test signal (filelog + Temporal OTLP) is
    # an operational follow-up, not part of this scaffold (ADR 0028).
    otel-collector:
      enabled: true
      # ClickStack's OpAMP-managed default is currently crashing during remote
      # config application. Run the bundled collector as the standalone
      # ClickHouse-writing gateway instead; keep ingestion protected with the
      # same generated HyperDX API key rather than opening unauthenticated OTLP.
      extraEnvs:
        - name: OPAMP_SERVER_URL
          value: ""
        - name: OTLP_AUTH_TOKEN
          valueFrom:
            secretKeyRef:
              name: clickstack-secret
              key: HYPERDX_API_KEY
      resources:
        requests:
          cpu: 250m
          memory: 512Mi
        limits:
          cpu: "1"
          memory: 1Gi
