---
# yaml-language-server: $schema=https://kubernetes-schemas.pages.dev/helm.toolkit.fluxcd.io/helmrelease_v2.json
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: bakery-server
spec:
  chartRef:
    kind: OCIRepository
    name: bakery-server
  interval: 1h
  values:
    controllers:
      server:
        strategy: RollingUpdate
        containers:
          app:
            image:
              repository: 192.168.1.106/bakery/server
              tag: main-6f4f16b
              digest: sha256:819393fb99a606f869811763a5c61d4ae057704e9f10aa004b375e0f47d79c0d
            probes:
              liveness: &probes
                enabled: true
                custom: true
                spec:
                  httpGet:
                    path: /
                    port: &port 8000
                  initialDelaySeconds: 5
                  periodSeconds: 10
                  timeoutSeconds: 2
                  failureThreshold: 3
              readiness: *probes
            securityContext:
              allowPrivilegeEscalation: false
              readOnlyRootFilesystem: true
              capabilities: { drop: ["ALL"] }
            resources:
              requests:
                cpu: 25m
                memory: 64Mi
              limits:
                memory: 256Mi
    defaultPodOptions:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        runAsGroup: 65534
    service:
      app:
        controller: server
        ports:
          http:
            port: *port
