---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: bakery-server
spec:
  parentRefs:
    - name: envoy-external
      namespace: network
      sectionName: https
  hostnames:
    - "${SECRET_DOMAIN_TWO}"
    - "www.${SECRET_DOMAIN_TWO}"
  rules:
    - backendRefs:
        - name: bakery-server
          port: 8000
