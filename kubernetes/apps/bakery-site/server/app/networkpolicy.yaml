---
apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: bakery-server-isolation
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/controller: server
      app.kubernetes.io/instance: bakery-server
      app.kubernetes.io/name: bakery-server
  policyTypes:
    - Ingress
    - Egress
  ingress:
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: network
          podSelector:
            matchLabels:
              gateway.envoyproxy.io/owning-gateway-name: envoy-external
      ports:
        - port: 8000
          protocol: TCP
  egress:
    - to:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: kube-system
          podSelector:
            matchLabels:
              k8s-app: kube-dns
      ports:
        - port: 53
          protocol: UDP
        - port: 53
          protocol: TCP
