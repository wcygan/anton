---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: spegel
spec:
  chartRef:
    kind: OCIRepository
    name: spegel
  interval: 1h
  values:
    spegel:
      containerdSock: /run/containerd/containerd.sock
      containerdRegistryConfigPath: /etc/cri/conf.d/hosts
      # WHY: Explicitly list registries for Spegel to mirror.
      # Without this, Spegel uses _default which intercepts ALL registries,
      # but can't fallback to non-standard registries after 404.
      mirroredRegistries:
        - https://docker.io
        - https://ghcr.io
        - https://gcr.io
        - https://registry.k8s.io
        - https://quay.io
        - https://mcr.microsoft.com
        # Harbor LAN LB (plan 0006). Listed so Spegel manages its hosts.toml
        # entry; combined with prependExisting below, Spegel prepends its
        # P2P layer while preserving the Talos-level mirror as fallback.
        - http://192.168.1.106
      # Preserve Talos-managed containerd mirror configs (the 192.168.1.106
      # entry from talos/patches/global/machine-registries.yaml). Without
      # this, Spegel backs up and removes non-Spegel host configs from
      # /etc/cri/conf.d/hosts/ on each reconcile, which broke Harbor pulls
      # after every node reset pre-reset (commit 12f48802 context).
      prependExisting: true
    service:
      registry:
        hostPort: 29999
        # WHY: This is a single-zone flat homelab — nodes carry no
        # topology.kubernetes.io/zone labels, so topology-aware hints can never
        # be programmed and the EndpointSlice controller logs a
        # TopologyAwareHintsDisabled warning on every reconcile. Disabling the
        # hints drops the chart's service.kubernetes.io/topology-mode=auto
        # annotation; routing is unchanged (all 3 nodes are effectively local).
        topologyAwareHintsEnabled: false
    serviceMonitor:
      enabled: false
    grafanaDashboard:
      enabled: false
