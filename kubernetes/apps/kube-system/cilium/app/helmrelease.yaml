---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: cilium
spec:
  chartRef:
    kind: OCIRepository
    name: cilium
  interval: 1h
  values:
    autoDirectNodeRoutes: true
    # NOTE: cleanState was tried 2026-04-23 as part of ADR 0021's original
    # remediation for cilium/cilium #42007, but reverted same-day when
    # rolling restarts deadlocked — the init container's safety check
    # "Agent should not be running when cleaning up / Found pidfile
    # /var/run/cilium/cilium.pid" blocks the new pod because the host's
    # /var/run/cilium/ still holds the departing agent's pidfile during a
    # DaemonSet rolling update. cleanState is a manual one-shot recovery
    # flag upstream, not a permanent value. The 3584Mi memory bump below
    # is the durable half of the #42007 remediation and stands on its own.
    # If BPF-state corruption ever needs a one-shot wipe, flip cleanState
    # to true, apply, delete the pod, then flip back — do NOT leave it on.
    bpf:
      masquerade: true
      # Ref: https://github.com/siderolabs/talos/issues/10002
      hostLegacyRouting: true
    cni:
      # Required for pairing with Multus CNI
      exclusive: false
    cgroup:
      automount:
        enabled: false
      hostRoot: /sys/fs/cgroup
    # Constrain KPR device auto-detection to physical NICs so tailscale0 is
    # excluded — otherwise Cilium propagates the tailnet iface's 1280 MTU to
    # the whole datapath and craters Tailscale-proxied throughput.
    # Ref: tailscale/tailscale#12393, ADR 0012 Consequences.
    devices: enp+
    dashboards:
      enabled: false
    endpointRoutes:
      enabled: true
    # WHY: Resource limits prevent runaway memory consumption from impacting node stability.
    # Current usage: cilium envoy ~71Mi per node
    # Limits set at ~3x current usage with headroom for proxy growth.
    envoy:
      rollOutPods: true
      prometheus:
        serviceMonitor:
          enabled: false
      resources:
        limits:
          memory: 256Mi
        requests:
          cpu: 10m
          memory: 64Mi
    gatewayAPI:
      enabled: true
    hubble:
      enabled: true
      relay:
        enabled: true
        rollOutPods: true
        # WHY: Resource limits prevent relay from consuming excessive memory
        resources:
          limits:
            memory: 128Mi
          requests:
            cpu: 10m
            memory: 32Mi
      ui:
        enabled: true
        rollOutPods: true
        # WHY: Resource limits prevent UI from consuming excessive memory
        frontend:
          resources:
            limits:
              memory: 64Mi
            requests:
              cpu: 10m
              memory: 32Mi
        backend:
          resources:
            limits:
              memory: 64Mi
            requests:
              cpu: 10m
              memory: 32Mi
    ipam:
      mode: kubernetes
    ipv4NativeRoutingCIDR: "10.42.0.0/16"
    k8sServiceHost: 127.0.0.1
    k8sServicePort: 7445
    kubeProxyReplacement: true
    kubeProxyReplacementHealthzBindAddr: 0.0.0.0:10256
    l2announcements:
      enabled: true
    loadBalancer:
      algorithm: maglev
      mode: "dsr"
    localRedirectPolicies:
      enabled: true
    # WHY: Resource limits for operator prevent runaway memory consumption.
    # Current usage: cilium operator ~63Mi
    # Limits set at ~4x current usage with headroom for reconciliation loops.
    operator:
      dashboards:
        enabled: false
      prometheus:
        enabled: true
        serviceMonitor:
          enabled: true
      replicas: 2
      rollOutPods: true
      resources:
        limits:
          memory: 256Mi
        requests:
          cpu: 10m
          memory: 64Mi
    prometheus:
      enabled: true
      serviceMonitor:
        enabled: true
        trustCRDsExist: true
    rollOutCiliumPods: true
    routingMode: native
    securityContext:
      capabilities:
        ciliumAgent:
          - CHOWN
          - KILL
          - NET_ADMIN
          - NET_RAW
          - IPC_LOCK
          - SYS_ADMIN
          - SYS_RESOURCE
          - PERFMON
          - BPF
          - DAC_OVERRIDE
          - FOWNER
          - SETGID
          - SETUID
        cleanCiliumState:
          - NET_ADMIN
          - SYS_ADMIN
          - SYS_RESOURCE
    socketLB:
      enabled: true
      hostNamespaceOnly: true
    # WHY: Memory limit sized against cgroup WSS (RSS + active page cache),
    # not process RSS. History of this setting:
    #   - chart default 1536Mi: too tight; k8s-2 OOM-killed 2026-04-20 (ADR 0020)
    #   - 2560Mi (ADR 0020, 2026-04-21): closed the cgroup-OOM face, but the
    #     2026-04-23 20:45-20:47Z two-node cascade hit with cilium-agents at
    #     ~30% of that ceiling — the mechanism's second face is cilium/cilium
    #     #42007 (BPF map corruption under pod-churn, doesn't require OOM)
    #   - 3584Mi (ADR 0021, current): +1 GiB above observed peak per #42007
    #     remediation. 4.7x k8s-1 steady state; still ~3.7% of node RAM.
    # Paired with cleanState: true above — the two changes together are the
    # upstream-recommended remediation. Plan 0009 Phase 2.
    resources:
      limits:
        memory: 3584Mi
      requests:
        cpu: 100m
        memory: 512Mi
