---
apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: headlamp
spec:
  chart:
    spec:
      chart: headlamp
      version: 0.43.0
      sourceRef:
        kind: HelmRepository
        name: headlamp
      interval: 15m
  interval: 1h
  values:
    fullnameOverride: headlamp

    config:
      inCluster: true
      inClusterContextName: anton
      oidc:
        secret:
          create: false

    serviceAccount:
      create: true
      name: headlamp

    # The generated service account is bound read-only in rbac.yaml. Use OIDC
    # before granting Headlamp write access or long-lived credentials.
    clusterRoleBinding:
      create: false

    service:
      type: ClusterIP
      port: 80

    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 500m
        memory: 512Mi

    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      privileged: false
      readOnlyRootFilesystem: true
      runAsGroup: 101
      runAsNonRoot: true
      runAsUser: 100
      seccompProfile:
        type: RuntimeDefault
