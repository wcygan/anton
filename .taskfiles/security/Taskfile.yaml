---
version: '3'

tasks:

  audit:
    desc: Run agentless Trivy configuration/RBAC and Kubescape NSA scans
    cmd: bash {{.SCRIPTS_DIR}}/security-audit.sh cluster
    preconditions:
      - test -f {{.KUBECONFIG}}
      - test -f {{.SCRIPTS_DIR}}/security-audit.sh
      - which jq kubectl kubescape trivy

  audit-images:
    desc: Explicitly scan cluster workload images with agentless Trivy
    cmd: bash {{.SCRIPTS_DIR}}/security-audit.sh images
    preconditions:
      - test -f {{.KUBECONFIG}}
      - test -f {{.SCRIPTS_DIR}}/security-audit.sh
      - which jq kubectl trivy
